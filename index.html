-------|\n| DRD case | 批量回归其余 cyclic case（R/G/B/Y/C/M、hit、1lane） | 高 |\n| DRD checker | 确认 smoke case 在 `drd_input_check_on=1` 下无新增误报 | 中 |\n| DRD case | 如批量回归通过，更新 `REVIEW.md` 准备正式回传 | 中 |\n\n### 发现问题\n\n- 原 input monitor 误认为每个 `DTCLK` 上升沿对应一个 pixel，实际 2P 模式下每个像素占 2 个 `DTCLK` 周期；已修正采样率。\n- `LS_BISR_Lx_PRE` 下降沿后存在 2 个 dummy 周期，且因 `@(posedge)` 语义需再 skip 1 个过渡周期才能落在 pixel 0 起点；已调整 skip 数为 3。\n\n### 明日计划\n\n- 跑完剩余 cyclic case 回归，确认 checker 行为一致。\n- 若回归无阻塞，整理 `REVIEW.md` 并准备服务器回传。\n", "HV2M23/每日记录_0707.md": "# 每日记录 - 07/07 (星期二)\n\n### 今日完成\n\n#### [模块名]\n\n| 类型 | 事项 | 结果/状态 |\n|------|------|----------|\n| [子任务] | [简要描述] | ✅ |\n\n### 下一步待做\n\n| 模块 | 事项 | 优先级 |\n|------|------|--------|\n| [模块名] | [待做事项] | 中 |\n\n### 发现问题\n\n| 模块 | 问题 | 影响 | 状态 |\n|------|------|------|------|\n| - | 暂无 | - | - |\n\n### 明日计划\n\n| 模块 | 计划事项 |\n|------|----------|\n| [模块名] | [计划内容] |\n", "HV2M23/每日记录_0716.md": "# 每日记录 - 07/16 (星期四)\n\n### 今日完成\n\n#### team-share 站点维护\n\n| 类型 | 事项 | 结果/状态 |\n|------|------|----------|\n| 内容补充 | 按原始 Word 文档补充 synthesis flow 7 篇文章的二级/三级标题细节 | ✅ |\n| 图片插入 | 从 Word 提取 4 张原图并插入对应章节（LEC、Signoff、流程图等） | ✅ |\n| 页面修复 | 修复 Signoff 与时序页空白：调整 marked 渲染与目录生成顺序，移除 mermaid 代码块 | ✅ |\n| 导航优化 | 左侧目录顶部改为显示当前文章 h1 标题，不再显示\"本页目录\" | ✅ |\n| 站点部署 | 提交并推送到 GitHub Pages（`team-share-public`） | ✅ |\n\n### 下一步待做\n\n- 暂无\n\n### 发现问题\n\n| 模块 | 问题 | 影响 | 状态 |\n|------|------|------|------|\n| synthesis flow 页面 | 原 TOC 脚本在 marked 渲染前执行，导致 article 为空、目录无内容 | Signoff 等页面显示空白 | 🔵 |\n\n### 明日计划\n\n- 暂无\n", "HV2M23/规则_日报内容范围.md": "# 日报内容范围规则\n\n> 本规则由用户于 2026/06/30 明确指定，适用于 HV2M23 项目日报记录。\n\n## 只记录真正的功能工作\n\n日报应局限于以下三类内容：\n\n1. **RTL code**：RTL 设计、修改、审查、验证、bugfix\n2. **Case**：测试 case 创建 / 修改 / 回归 / 调试\n3. **环境**：直接影响仿真或 bring-up 的验证环境改动\n\n## 不记录以下内容\n\n- 脚本内部实现细节（改了什么参数、怎么重写、加了什么选项）\n- 文档-only 更新（`CHANGES.md`、`REVIEW.md`、内部笔记等）\n- 非公开的、项目管理类、不对外交付的辅助性工作\n\n## 例外\n\n若某项脚本 / 文档改动与功能结果强耦合（例如新增 case 必须同步到 `case_list.txt` 才能被回归调用），只写功能结果，不写文件编辑细节。\n", "HV2M23/遗留问题.md": "# 遗留问题\n\n| 日期 | 模块 | 问题描述 | 状态 | 关闭日期 |\n|------|------|----------|------|----------|\n| 06/15 | DRDOD 报告 | 当前 `make_v3.py` 是基于已生成 Excel 的后处理；若从 Markdown 重新生成，需重写生成脚本才能自动把图片放到对应栏目 | 🟡 | |\n| 06/24 | DRD_OD / Panel Remap | 当前 RTL 和代码把 G1/G2 当作独立两行处理，但实为 GOA dual-gate；数据无行缓存，按行检测 DRD_OD pattern 的前提错误，需要基于 dual-gate 重新推导 | 🔵 | 06/27 |\n| 06/24 | DRDOD direct data | `drdod_data_gen.svh` 对 L0/L1 的取列方式错误导致 `t_8b2lane_DRD_M_panel_BOE1` 波形异常。已按 `DRD_OD_PATTERN_DETECT.v` 改为 L0 负责奇数列 Y1/Y3/Y5、L1 负责偶数列 Y2/Y4/Y6，并用 `line_num % 4` 循环选 gate。06/29 进一步修正 BOE1/HKC2/HKC5 共 4 处 gate pattern 查表错误，panel 1~7 × G1~G4 全部 28 项与 RTL 模板一致 | 🔵 | 06/29 |\n| 06/24 | DRDOD 部署 | 全部 23 个 DRD case 的 `user_def.sv` 已补 `` `define DRDOD ``；部署包已迭代至 `drd_for_server_v6.tar.gz` | 🔵 | 06/24 |\n| 06/24 | 代码清理 | 已删除 `tests/` 与 `DV_TCON_C/top/tests/` 中废弃的 remap 相关文件 | 🔵 | 06/24 |\n| 06/29 | 项目清理 | 已删除项目根目录 `tests/`；清理 `DV_TCON_C/top/tests/` 下 20+ 个废弃 Python/Shell 脚本与仿真临时产物；case 命名统一为 `t_drdod_<function>_<lane>_<panel>_<color>` | 🔵 | 06/29 |\n", "HV2M23/附件/DRD_OD_dual_gate_analysis_20250624.md": "# DRD_OD 架构理解分析 — RTL 代码验证报告\n\n> **日期**: 2026-06-24  \n> **主题**: 验证 GOA Dual-Gate vs RTL 按行理解的架构偏差  \n> **来源**: 基于 `DRD_OD.v`、`DRD_OD_PATTERN_DETECT.v`、`DRD_OD_ADD_WEIGHT.v` 代码逐行验证\n\n---\n\n## 一、核心结论（用户提出的理解正确）\n\n| 用户观点 | 代码验证结果 | 结论 |\n|---------|------------|------|\n| 数据没有整行缓存 | 无 line buffer，`PATTERN_DETECT` 为纯组合逻辑 | ✅ **正确** |\n| 不存在\"一行缓存\"概念 | 每拍只处理 2 像素（2 列）的 6 个 OP 分量 | ✅ **正确** |\n| G1/G2 是 GOA Dual-Gate，不是两行 | 面板物理层面成立，但 RTL 的 L0/L1 是 2-lane 数据通道 | ✅ **正确（物理层面）** |\n| 之前把 G1/G2 当作 L1/L2 两行是错误理解 | 文档中确实存在 GOA 结构 → RTL 行相位的错位映射 | ✅ **正确** |\n\n---\n\n## 二、RTL 代码逐层验证\n\n### 2.1 数据通路：无整行缓存，per-clock 处理\n\n**文件**: `DRD_OD.v`（line 67-86）\n\n```verilog\nalways @(posedge DTCLK_L0 or negedge RSTN_2P) begin\n    if(!RSTN_2P)\n        DATAI_L0_OD_pre <= 'd0;\n    else if(iSP_1Pto2P) \n        DATAI_L0_OD_pre <= DATAI_L1_OD_pre;            \n    else\n        DATAI_L0_OD_pre <= DATAI_L0;\nend\n```\n\n- `DATAI_L0` / `DATAI_L1` 是 **24-bit 并行输入**（各 1 个 RGB 像素）\n- 每个 `DTCLK` 拍进来 2 个像素，**直接送 `PATTERN_DETECT`**\n- **无 line buffer，无 FIFO，无行级缓存**\n- 处理粒度是 **per-clock（每拍 2 像素）**，不是 per-line（每行 N 像素）\n\n---\n\n### 2.2 PATTERN_DETECT：组合逻辑，每拍只检测 2 列\n\n**文件**: `DRD_OD_PATTERN_DETECT.v`（line 24-38）\n\n```verilog\nwire [7:0]  DATAI_OD_OP1 = DATAI_L0_OD[ 7: 0];  // L0 的 B\nwire [7:0]  DATAI_OD_OP2 = DATAI_L1_OD[ 7: 0];  // L1 的 B\nwire [7:0]  DATAI_OD_OP3 = DATAI_L0_OD[15: 8];  // L0 的 G\nwire [7:0] DATAI_OD_OP4 = DATAI_L1_OD[15: 8];  // L1 的 G\nwire [7:0]  DATAI_OD_OP5 = DATAI_L0_OD[23:16];  // L0 的 R\nwire [7:0]  DATAI_OD_OP6 = DATAI_L1_OD[23:16];  // L1 的 R\n```\n\n`OP1~OP6` 是**同一拍**同时到达的 2 个像素（2 列）的 6 个颜色分量。\n\n但这里的\"2 个像素\"是**当前代码的理解**——即把 2 个 lane 的 48bit 数据当成**横向的 6 个 8bit 数据**（6×8=48bit），按标准 RGB 像素理解：\n\n```\n当前代码的理解（图1）:\n┌────┬────┬────┬────┬────┬────┐\n│ Y1 │ Y2 │ Y3 │ Y4 │ Y5 │ Y6 │  ← 横向 6 个数据（6 列）\n├────┼────┼────┼────┼────┼────┤\n│ R  │ B  │ B  │ R  │ B  │ B  │  ← 行1（某种颜色层）\n│ G  │ R  │ G  │ G  │ R  │ G  │  ← 行2（某种颜色层）\n│ B  │ R  │ B  │ B  │ R  │ B  │  ← 行3（B 层）\n│ G  │ G  │ R  │ G  │ G  │ R  │  ← 行4（G 层）\n└────┴────┴────┴────┴────┴────┘\n```\n\n图1 把数据理解成了**4 行 × 6 列**的完整矩阵（24 个子像素），但 2 个 lane 每拍只有 48bit=6 个 8bit 数据。这意味着图1 不是直接的数据映射，而是当前文档/代码把**面板子像素排列**理解成了\"4 行 phase（L1~L4）× 6 列\"的完整 RGB 矩阵——即每行有完整的颜色分量，把 G1/G2 的 dual-gate 结构错误地展开成了 4 行。\n\n**实际的面板结构（图2）应该是 GOA Dual-Gate：**\n\n```\n实际结构（图2）:\n┌────┬────┬────┬────┬────┬────┐\n│ Y1 │ Y2 │ Y3 │ Y4 │ Y5 │ Y6 │  ← 6 列（每列 1 个子像素）\n├────┼────┼────┼────┼────┼────┤\n│ G  │ B  │ G  │ G  │ B  │ G  │  ← G1 行（Gate 1）= GBGGBG\n│ R  │ R  │ B  │ R  │ R  │ B  │  ← G2 行（Gate 2）= RRBRRB\n└────┴────┴────┴────┴────┴────┘\n```\n\n图2 中：\n- **只有 2 行**（G1/G2），不是 4 行\n- **每列只有 1 个子像素**（不是完整的 RGB 像素）\n- G1 无 R（G1 = GBGGBG），R 都在 G2（G2 = RRBRRB）\n- 每拍 2 个 lane 的 48bit 数据应该对应 **G1 的 3 列 + G2 的 3 列**（共 6 列中的 3 列），而不是 2 个标准 RGB 像素\n\n**两张图的关键差异：**\n\n| 维度 | 图1（当前代码/文档理解） | 图2（实际 GOA Dual-Gate） |\n|------|------------------------|------------------------|\n| 行数 | 4 行（某种颜色层/phase 展开） | 2 行（G1/G2） |\n| 每列分量数 | 每列有多个颜色（完整 RGB） | 每列只有 1 个子像素 |\n| G1 结构 | 隐含在 4 行中，未明确区分 | 明确为 G1 = GBGGBG |\n| G2 结构 | 隐含在 4 行中，未明确区分 | 明确为 G2 = RRBRRB |\n| R 的位置 | 分散在 4 行中 | 集中在 G2 行 |\n| 数据映射 | 6 个 OP = 2 个标准 RGB 像素 | 6 个 OP = G1 的 3 列 + G2 的 3 列 |\n\n> **附件图片**：`图1_当前代码理解_横向6数据.png`、`图2_实际GOA_dual_gate结构.png`\n\n```verilog\nwire [5:0] op_no_zero_match = {OP6_no_zero, OP5_no_zero, OP4_no_zero,\n                                OP3_no_zero, OP2_no_zero, OP1_no_zero};\nwire od_pattern_hit = (op_no_zero_match == od_pattern_match);\n```\n\n- `PATTERN_DETECT` 是**纯组合逻辑**\n- 每拍比较 `op_no_zero_match` 与 `od_pattern_match`\n- 检测范围 = **2 列（2 个像素）的 6 个子像素**\n- 不是\"一行\"的检测，不是\"多列\"的检测\n\n---\n\n### 2.3 `line_cnt_od` 的作用：模板选择器，不是数据处理\n\n**文件**: `DRD_OD_ADD_WEIGHT.v`（line 137-147, 167）\n\n```verilog\nalways @(posedge CLK_L0 or negedge RSTN) begin\n    if(!RSTN)      line_cnt_od <= 'd0;\n    else if(VS)    line_cnt_od <= 'd0;\n    else if(LS_L0)\n        if(line_cnt_od == OD_LINE_CNT_TARGET)\n            line_cnt_od <= 'd0;\n        else\n            line_cnt_od <= line_cnt_od + 1;\nend\nassign OD_phase_sel = line_cnt_od[1:0];\n```\n\n- `line_cnt_od` 是**行计数器**，只在 `LS_L0`（行同步）时 +1\n- 唯一作用：驱动 `OD_phase_sel` 选择当前用哪个 match template（L1/L2/L3/L4）\n- **不参与数据缓冲**，不改变 `PATTERN_DETECT` 的 per-clock 机制\n- `OD_phase_sel` 是**查表索引**，不是数据流控制信号\n\n---\n\n### 2.4 RTL 的 L0/L1 是 2-lane 数据通道，不是 GOA 的 G1/G2\n\n| 概念 | 物理含义 | 对应关系 |\n|------|---------|---------|\n| `DATAI_L0` | 偶数列像素（lane 0） | 数据传输通道 |\n| `DATAI_L1` | 奇数列像素（lane 1） | 数据传输通道 |\n| GOA G1 | Dual gate 的第一条 gate 线 | 面板驱动结构 |\n| GOA G2 | Dual gate 的第二条 gate 线 | 面板驱动结构 |\n\n`OP1~OP6` 检测的是 2 列的 RGB 分量（每列 3 色），这 2 列可能是 GOA G1 和 G2 对应的不同列。但 RTL 并不知道 GOA 的 dual gate 结构，它只处理 2-lane 数据。\n\n---\n\n### 2.5 BOE1 模板的验证：RTL 只检测 2 列，但模板覆盖 6 列逻辑\n\n**文件**: `DRD_OD_PATTERN_DETECT.v`（line 126）\n\n```verilog\n{3'd7, 2'd0}: begin {r_match, g_match, b_match} = \n    {6'b000000, 6'b101101, 6'b010010}; ... // BOE1 L1\n```\n\nBOE1 L1 的模板：\n- `r_match = 6'b000000` → 要求 OP1~OP6 的 R 分量全为 0\n- `g_match = 6'b101101` → G 分量特定位置非零\n- `b_match = 6'b010010` → B 分量特定位置非零\n\n但用户指出 BOE1 的 G1 对应 `GBGGBG`（6 列的 G/B 排列），G1 无 R，R 在 G2。\n\n**问题**：RTL 的 `PATTERN_DETECT` 每拍只检测 2 列（6 个 OP），但 BOE1 的 GOA 结构是 6 列的 dual gate 排列。模板 `6'b000000` 对应 6 个 OP 位，但每拍只有 2 列数据进来。\n\n这意味着：\n1. 模板的设计可能是基于 6 列的某种折叠或聚合逻辑\n2. 或者模板的 `6'b000000` 在 dual gate 结构下意味着\"当前 2 列中无 R\"，而 R 在下一拍（对应 G2 的列）\n3. 当前模板的 zero/non-zero 检测可能不是直接对应物理列的 color 存在性，而是对应某种更抽象的 pattern\n\n这需要结合面板的 GOA 时序和 TCON 的数据发送时序来重新推导。\n\n---\n\n## 三、文档中的理解偏差（已确认）\n\n### 3.1 `DRD_OD_analysis.md` 中的问题\n\n文档将 `OD_phase_sel` 的 L1/L2/L3/L4 描述为\"每 4 行一个 phase 周期\"、\"行相位\"。这个描述在**数据发送时序**层面是正确的，但可能混淆了：\n\n- **数据时序行**：TCON 发送数据时的行计数（`line_cnt_od` 驱动）\n- **GOA gate 行**：面板物理上的 gate 线（G1/G2 是 dual gate 的上下两条线）\n\n图1 展示了当前文档/代码的理解：把面板排列理解成了\"4 行 × 6 列\"的完整 RGB 矩阵（每行有完整的颜色分量）。但图2 显示实际面板只有 **2 行（G1/G2）× 6 列**，每列只有 1 个子像素。\n\n这意味着：\n- **当前文档把 G1/G2 的 2 行 dual-gate 结构错误地展开成了 4 行**（可能是把 G1/G2 + 某种 polarity 或其他因素理解为 4 行）\n- **4 个 phase（L1~L4）可能不是对应 4 行子像素排列**，而是对应某种更复杂的时序（如 G1/G2 × 2 种 polarity = 4 种状态）\n- `OD_phase_sel` 的 4 个值需要重新解释为 GOA dual-gate 的某种时序控制，而不是简单的\"行相位\"\n\n### 3.2 `DRD_OD_Panel_Remap_Plan.md` 中的问题\n\n文档 §2.1 的物理排列表和 §2.4 的 remap 规则表，基于\"L0/L1 分别负责 3 列\"的假设推导。但如果 G1/G2 是 dual gate：\n- G1 和 G2 不是按列划分的（不是 G1=偶数列，G2=奇数列）\n- G1 和 G2 是按**行（水平线）**划分的，可能 G1 驱动上半屏的行，G2 驱动下半屏的行\n- 或者 G1/G2 是同一行上的 dual gate（两条 gate 线控制同一行像素的不同子像素）\n\n无论哪种 dual gate 结构，remap 的\"列分配\"逻辑（L0=col0,2,4；L1=col1,3,5）可能都需要重新审视。\n\n更关键的是，当前文档中的 remap 推导基于**图1 的 4 行理解**，而实际面板是**图2 的 2 行 dual-gate**。这意味着：\n- `panel_remap.svh` 中的 `L0/L1` mask 表可能把数据映射到了错误的行/phase\n- BOE1 L1 的 `BGGBGG` 排列（文档中）与实际 G1 的 `GBGGBG`（图2）不一致\n- 整个 remap 规则的前提（\"标准 RGB 像素 → 面板子像素排列\"）可能需要改为\"标准 RGB 像素 → GOA dual-gate 子像素排列\"\n\n---\n\n## 四、关键发现：RTL 模板与物理面板的映射关系待澄清\n\n### 4.1 当前 RTL 模板的设计假设\n\nRTL 的 `PATTERN_DETECT` 模板是一个 **6-bit 向量**，对应 2 列（2 像素）的 6 个子像素：\n\n```\nOP1 = L0[7:0]   = pixel[even].B\nOP2 = L1[7:0]   = pixel[odd].B\nOP3 = L0[15:8]  = pixel[even].G\nOP4 = L1[15:8]  = pixel[odd].G\nOP5 = L0[23:16] = pixel[even].R\nOP6 = L1[23:16] = pixel[odd].R\n```\n\n模板 `6'b101101` 表示：\n- bit5=1 → OP6 (G2_sub1) ≠ 0\n- bit4=0 → OP5 (G1_sub1) = 0\n- bit3=1 → OP4 (G2_sub2) ≠ 0\n- bit2=1 → OP3 (G1_sub2) ≠ 0\n- bit1=0 → OP2 (G1_sub3) = 0\n- bit0=1 → OP1 (G2_sub3) ≠ 0\n\n**注意**：这里 OP 到 G1/G2 子像素的映射关系需要根据实际数据发送顺序重新推导。当前代码的映射是\"标准 RGB\"理解（B1/B2/G1/G2/R1/R2），但实际的 6 个 OP 应该对应 **G1 的 3 列子像素 + G2 的 3 列子像素**（或反之），具体取决于 TCON 的数据打包顺序。\n\n### 4.2 与 BOE1 G1 = GBGGBG 的关系\n\n如果 BOE1 G1 的排列是 `GBGGBG`（6 列），G2 是 `RRBRRB`（6 列）：\n- G1: col0=G, col1=B, col2=G, col3=G, col4=B, col5=G — **无 R**\n- G2: col0=R, col1=R, col2=B, col3=R, col4=R, col5=B — **有 R**\n\nRTL 每拍处理 2 个 lane 的 48bit 数据。在**当前代码的理解**（图1）中，这 48bit 被当成 2 个标准 RGB 像素（横向 6 个 8bit 分量）：\n\n```\n当前代码的理解：\nL0 = {R, G, B}  (pixel[even] 的标准 RGB)\nL1 = {R, G, B}  (pixel[odd] 的标准 RGB)\nOP1~OP6 = {L1.B, L0.B, L1.G, L0.G, L1.R, L0.R}  ← 按标准 RGB 分量命名\n```\n\n但在**实际的面板结构**（图2）中，这 48bit 应该对应 **G1 的 3 列 + G2 的 3 列**（每列 1 个子像素，不是 3 个）：\n\n```\n实际结构（以 col0~2 为例，假设 TCON 按 G1→G2 顺序发送）：\nL0 = {G1_col2, G1_col1, G1_col0}  = {G, B, G}  ← G1 的 3 列子像素\nL1 = {G2_col2, G2_col1, G2_col0}  = {R, R, B}  ← G2 的 3 列子像素\n\nOP1~OP6 应该对应：\nOP6 = L1[23:16] = G2_col0 = R\nOP5 = L1[15:8]  = G2_col1 = R\nOP4 = L1[7:0]   = G2_col2 = B\nOP3 = L0[23:16] = G1_col0 = G\nOP2 = L0[15:8]  = G1_col1 = B\nOP1 = L0[7:0]   = G1_col2 = G\n\nop_no_zero = {B≠0, R≠0, R≠0, G≠0, B≠0, G≠0} = 6'b111111（所有非零）\n```\n\n但 BOE1 L1 的模板是：\n- `r_match = 6'b000000` — 要求所有 OP 为 0，但 G2 有 R（非零），这不可能匹配\n- `g_match = 6'b101101` — 要求 OP6=1, OP5=0, OP4=1, OP3=1, OP2=0, OP1=1\n- `b_match = 6'b010010` — 要求 OP6=0, OP5=1, OP4=0, OP3=0, OP2=1, OP4=0\n\n**核心矛盾**：\n1. 如果 6 个 OP 对应 G1 的 3 列 + G2 的 3 列，那么 G2 有 R（OP5, OP6 非零），但 `r_match=000000` 要求所有 OP 为 0\n2. 这意味着 `r_match` 在 L1 时永远不匹配（因为 G2 有 R）\n3. 但 `g_match=101101` 和 `b_match=010010` 有非零位，说明模板期望某些 OP 非零\n\n**可能的解释**（待验证）：\n- **解释 A**：`r_match` 在 L1 时确实应该为 `000000`，因为 G1 无 R，且当前拍不检测 G2 的 R（或者 G2 的 R 在另一拍处理）\n- **解释 B**：TCON 的数据发送顺序不是 G1→G2，而是其他方式（如交错发送），导致 6 个 OP 的映射关系不同\n- **解释 C**：模板中的 6-bit 不是直接对应物理列的 zero/non-zero，而是某种经过 remapping 或聚合后的抽象 pattern\n- **解释 D**：当前 RTL 的 `OP1~OP6` 命名（B/G/R）是误导性的，实际数据已经是子像素顺序，但模板设计假设了某种特定的数据打包方式\n\n无论哪种解释，**当前代码把 48bit 当成\"横向 6 个标准 RGB 分量\"的理解与图2 的实际 GOA dual-gate 结构存在根本性偏差**。`OP1~OP6` 的映射关系、模板匹配的含义、以及 `OD_phase_sel` 的 4 个 phase 与 G1/G2 的对应关系，都需要基于 GOA 时序和 TCON 数据发送方式重新推导。\n\n### 4.3 需要重新推导的问题清单\n\n1. **GOA Dual-Gate 的物理时序** vs **TCON 数据发送时序** 的对应关系\n2. **6 列的物理排列** 如何映射到 **每拍 2 列的 OP1~OP6**\n3. **L1/L2/L3/L4 的 phase 定义** 在 dual gate 面板中对应什么（gate 周期？数据发送周期？）\n4. **模板 `r_match/g_match/b_match` 的 6-bit** 是否直接对应物理列的 color 存在性，还是某种抽象 pattern\n\n---\n\n## 五、后续行动建议\n\n| 优先级 | 事项 | 说明 |\n|-------|------|------|\n| 🔴 高 | 获取 BOE1 面板的 GOA 时序文档 | 确认 G1/G2 的 dual gate 结构、驱动时序、与 TCON 数据发送的对齐关系；明确图2 的 G1/G2 与 TCON lane 的映射 |\n| 🔴 高 | 重新推导 6 个 OP 与 G1/G2 子像素的映射关系 | 基于 GOA 时序和 TCON 数据打包方式，重新解释 `OP1~OP6` 对应 G1 的哪 3 列 + G2 的哪 3 列 |\n| 🔴 高 | 重新解释 `OD_phase_sel` 的 4 个 phase | 4 个 phase（L1~L4）在 dual-gate 面板中对应什么（G1/G2 × 2 polarity？或其他时序？） |\n| 🔴 高 | 重新推导 BOE1 L1/L2/L3/L4 模板与物理排列的映射 | 基于 GOA 时序重新解释 `r_match/g_match/b_match` 的 6-bit 含义；验证模板是否与图2 的 G1/G2 排列一致 |\n| 🟡 中 | 重新审视 `panel_remap.svh` 的设计前提 | 如果 dual gate 结构改变了列分配逻辑，remap 方案可能需要重新设计；修正 BOE1 L1 的 `BGGBGG` → `GBGGBG` |\n| 🟡 中 | 验证其他 panel（HKC1~HKC8）是否也存在类似问题 | 检查是否所有 panel 的模板都需要基于 GOA 结构重新推导 |\n| 🟢 低 | 更新 `DRD_OD_analysis.md` 和 `DRD_OD_verification_plan.md` | 在澄清物理映射后，同步更新文档中的架构描述和测试策略 |\n\n---\n\n## 六、附件参考\n\n- 本文件：`附件/DRD_OD_dual_gate_analysis_20250624.md`\n- 附件图片：`附件/图1_当前代码理解_横向6数据.png`、`附件/图2_实际GOA_dual_gate结构.png`\n- 原始 RTL 文件：`E:/project/HV2M23/hdl/DRD_OD.v`、`DRD_OD_PATTERN_DETECT.v`、`DRD_OD_ADD_WEIGHT.v`\n- 相关文档：`E:/project/HV2M23/markdown_drdod/DRD_OD_analysis.md`、`DRD_OD_Panel_Remap_Plan.md`\n", "工作周报/README.md": "# 工作周报\n\n本目录用于存放每周工作周报，按时间范围归档。\n\n## 格式规则\n\n详细规则见：[格式规则.md](格式规则.md)\n\n- 周报周期：**周三 ~ 下周二**\n- 文件命名：`工作周报_YYYYMMDD-YYYYMMDD.md`\n- 结构：本周工作 → 下周计划 → 需要协调和帮助\n\n## 周报列表\n\n- [2026/07/08 ~ 2026/07/14](工作周 、`make_v3.py`）是自己用的，不写进周报；只有需要分享/复用的工具才简要提及。\n6. **状态真实**：\n   - **待确认/待讨论**：必须是真正需要外部确认或设计决策的事项，不能把\"下一步计划\"\"待验证\"\"内部待做\"放进来。\n   - **进行中**：必须是本周已开始、尚未完成、下周还会继续的真实工作。\n   - **已完成**：必须是本周内实际完成、可验证的交付物或结论。\n   - **需要协调和帮助**：必须是真正需要他人配合、支持或确认的事项，不能是内部可自行推进的工作。\n\n## 四、周报结构\n\n周报必须包含以下 3 个一级标题，**禁止**添加\"今天更新汇总\"等额外一级标题：\n\n```markdown\n# 工作周报 - YYYY/MM/DD ~ YYYY/MM/DD\n\n## 本周工作（This week's work）\n\n## 下周计划（Next week's plan）\n\n## 需要协调和帮助（Needs coordination and assistance）\n```\n\n### 4.1 本周工作\n\n- 按项目分二级标题，格式：`### 项目名`\n- 当前周报涉及的所有项目都必须列出\n- 每个项目下按状态分组，使用纯文本标签（不要用加粗标题，避免 lint 警告）：\n  - `待确认/待讨论：` 后面换行跟列表\n  - `进行中：` 后面换行跟列表\n  - `已完成：` 后面换行跟列表\n- 状态分组必须全部出现，无内容时写：`- 暂无。`\n- 项目之间使用 `//-----------------------------------//` 分隔\n\n#### 已完成事项写作要求\n\n- 每条一句话，说明**交付了什么结果**，不要罗列过程细节。\n- 禁止出现：代码行号、具体文件名（除非该文件本身就是交付物）、实现步骤、调试过程。\n- 示例：\n  - ✅ 完成 DRDOD 设计报告 Excel v3，图片按规则分散到各内容 sheet。\n  - ✅ 完成 LC_CPUWR 及 LC_REG_MAPPING 重写，支持 chip_sel=1。\n  - ❌ 完成 `LC_CPUWR_20260616_v2_decimal.v` 创建，0x09/0x0A/0x1D/0x1E 改为参与 Seg1 checksum 并受 shadow 寄存器保护，`VBK_EN` 不再由 LC_CPUWR 直接输出。\n\n#### 进行中事项写作要求\n\n- 说明当前状态和阻碍/风险。\n- 如果工作被拖延或转移，如实说明原因，不要含糊。\n- 示例：\n  - ✅ 修改 TCON 环境以适配 DRDOD 功能；途中内网 AI 环境故障，同时转向处理 HK1V11，目前拖延，后续是否继续推进尚不确定。已输出修改计划 Markdown 文件。\n\n#### 待确认/待讨论事项写作要求\n\n- 只写真正需要外部决策或他人反馈的事项。\n- 不能把\"待验证\"\"待优化\"\"待继续\"放进来。\n- 示例：\n  - ✅ DRDOD 规格与 RTL 差异边界待 SPEC/RTL review 确认。\n  - ❌ v3 Excel 图文排版效果待验证后调整。\n\n### 4.2 下周计划\n\n- 按项目分二级标题：`### 项目名`\n- 列出明确的下周待执行事项\n- 事项以动词开头，标明目标或交付物\n- 如果本周某工作已停滞或转移，下周计划需反映真实打算\n\n### 4.3 需要协调和帮助\n\n- 跨项目的协调事项统一放在此处\n- 每条标注所属项目：`[项目名] 事项描述`\n- 只写真正需要他人配合的事项，内部可自行推进的不写\n- 示例：\n  - ✅ [HK1V11] 需夏鹏协助讨论并确定 LC_CPUWR / LC_REG_MAPPING 新功能的验证环境修改方案。\n  - ❌ [HK1V11] 完成 LC_CPUWR 上层 module 实例化同步修改。\n\n## 五、内容来源\n\n生成周报前必须阅读以下资料：\n\n1. **本周所有日报**：检查 `E:\\每日记录\\HK1V11\\每日记录_*.md` 和 `E:\\每日记录\\HV2M23\\每日记录_*.md`\n2. **遗留问题文件**：\n   - `E:\\每日记录\\HK1V11\\遗留问题.md`\n   - `E:\\每日记录\\HV2M23\\遗留问题.md`\n3. **上周周报**（如有）：用于延续未关闭事项\n4. **每周记录.md**（参考）：`E:\\每日记录\\每周记录.md`\n\n## 六、遗留问题同步规则\n\n整理周报时必须检查各项目的 `遗留问题.md`：\n\n- 本周新出现的跨天未关闭问题，应在周报\"待确认/待讨论\"或\"需要协调和帮助\"中体现\n- 状态发生变化的遗留问题，应更新描述\n- 已关闭的问题不再写入周报\n- 不要把\"下一步计划\"\"待继续推进\"自动当作遗留问题\n\n## 七、禁止事项\n\n1. ❌ 禁止添加\"今天更新汇总\"\n2. ❌ 禁止标注日期 `[MM/DD]`\n3. ❌ 禁止罗列过程细节、代码实现、调试步骤\n4. ❌ 禁止写入内部脚本/工具文件名（除非作为分享交付物简要提及）\n5. ❌ 禁止虚构未提及的内容、责任人或结论\n6. ❌ 禁止把\"待验证\"\"待优化\"\"待继续\"放入\"待确认/待讨论\"\n7. ❌ 禁止把内部可自行推进的工作放入\"需要协调和帮助\"\n8. ❌ 禁止遗漏本周有日报记录的项目\n9. ❌ 禁止在周报中混入非项目内容（如本地网站建设、工具优化等）\n\n## 八、生成流程\n\nAI 生成周报时应按以下顺序执行：\n\n1. 确定本周起止日期（周三→周二）\n2. 列出本周所有日报文件\n3. 逐份阅读日报，按项目/状态分类提取关键事项\n4. 合并同类事项，删除过程细节和日期\n5. 判断每个事项的真实状态：\n   - 是否真正需要外部确认 → 待确认/待讨论\n   - 是否正在推进但未完成 → 进行中\n   - 是否本周已完成 → 已完成\n   - 是否真正需要他人配合 → 需要协调和帮助\n6. 按本规则结构撰写周报\n7. 更新 `E:\\每日记录\\工作周报\\README.md` 周报列表\n\n## 九、示例结构\n\n```markdown\n# 工作周报 - 2026/06/10 ~ 2026/06/16\n\n## 本周工作（This week's work）\n\n### HV2M23\n\n待确认/待讨论：\n\n1. DRDOD 规格与 RTL 差异边界待 SPEC/RTL review 确认。\n\n进行中：\n\n1. 修改 TCON 环境以适配 DRDOD 功能；因内网 AI 环境故障及转向 HK1V11，目前拖延。已输出修改计划。\n\n已完成：\n\n1. 完成 DRDOD 设计报告 Excel v3。\n\n//-----------------------------------//\n\n### HK1V11\n\n待确认/待讨论：\n\n- 暂无。\n\n进行中：\n\n1. LC_CPUWR / LC_REG_MAPPING 已完成第一次修改，准备移入内网，正在推进。\n2. 对新功能进行验证，并与夏鹏讨论验证环境修改方案。\n3. 验证 LINK_LOGIC 上层实例化变更在目标环境的应用效果。\n\n已完成：\n\n1. 完成 LC_CPUWR 寄存器映射变更与源码实现。\n2. 完成 NG Unlock 方案设计与定稿，确定 Plan B 为推荐方案。\n3. 完成 LC_CPUWR 及 LC_REG_MAPPING 重写，支持 chip_sel=1。\n4. 完成 LINK_LOGIC 上层 module 实例化同步与文档归档。\n\n## 下周计划（Next week's plan）\n\n### HV2M23\n\n1. 视内网 AI 环境恢复情况，继续推进 TCON 环境修改。\n\n### HK1V11\n\n1. 推进 LC_CPUWR / LC_REG_MAPPING 向内网迁移。\n2. 完成新功能验证，并与夏鹏确认验证环境修改方案。\n3. 验证 LINK_LOGIC 实例化变更在目标环境的效果。\n\n## 需要协调和帮助（Needs coordination and assistance）\n\n1. [HV2M23] 需确认 DRDOD 规格与 RTL 差异边界。\n2. [HK1V11] 需夏鹏协助讨论验证环境修改方案。\n3. [HK1V11] 需内网环境支持以完成迁移与验证。\n```\n\n## 十、修订记录\n\n| 日期 | 修订内容 |\n|------|----------|\n| 2026/06/16 | 初版：明确周报周期、结构、格式要求 |\n| 2026/06/16 | 新增精简、准确、合并、无日期、去脚本化、状态真实等核心原则 |\n"};
    const FILE_TREE = {"__dirs__": {"HK1V11": {"__files__": ["checksum_update_时序图.md", "每周记录.md", "每日记录_0421.md", "每日记录_0430.md", "每日记录_0506.md", "每日记录_0507.md", "每日记录_0508.md", "每日记录_0511.md", "每日记录_0512.md", "每日记录_0513.md", "每日记录_0514.md", "每日记录_0515.md", "每日记录_0518.md", "每日记录_0519.md", "每日记录_0520.md", "每日记录_0521.md", "每日记录_0522.md", "每日记录_0525.md", "每日记录_0526.md", "每日记录_0527.md", "每日记录_0528.md", "每日记录_0529.md", "每日记录_0601.md", "每日记录_0602.md", "每日记录_0603.md", "每日记录_0605.md", "每日记录_0612.md", "每日记录_0615.md", "每日记录_0616.md", "每日记录_0617.md", "每日记录_0618.md", "每日记录_0622.md", "每日记录_0625.md", "每日记录_0626.md", "每日记录_0629.md", "每日记录_0630.md", "每日记录_0702.md", "每日记录_0703.md", "每日记录_0706.md", "每日记录_0707.md", "每日记录_0708.md", "每日记录_0709.md", "每日记录_0710.md", "每日记录_0713.md", "每日记录_0714.md", "每日记录_0715.md", "每日记录_0716.md", "每日记录_0717.md", "规则_日报内容范围.md", "遗留问题.md"]}, "HV2M23": {"__files__": ["每周记录.md", "每日记录_0604.md", "每日记录_0608.md", "每日记录_0609.md", "每日记录_0610.md", "每日记录_0615.md", "每日记录_0623.md", "每日记录_0624.md", "每日记录_0629.md", "每日记录_0630.md", "每日记录_0701.md", "每日记录_0707.md", "每日记录_0716.md", "规则_日报内容范围.md", "遗留问题.md"], "__dirs__": {"附件": {"__files__": ["DRD_OD_dual_gate_analysis_20250624.md"]}}}, "工作周报": {"__files__": ["README.md", "工作周报_20260603-20260609.md", "工作周报_20260610-20260616.md", "工作周报_20260617-20260623.md", "工作周报_20260624-20260630.md", "工作周报_20260701-20260707.md", "工作周报_20260708-20260714.md", "工作周报格式规则.md"]}}};
    const ALL_FILES = Object.keys(FILE_CONTENTS).sort().reverse();

    function renderTree(tree, parentPath = "") {
      let html = "";
      const dirs = tree.__dirs__ || {};
      const files = tree.__files__ || [];

      for (const dirName of Object.keys(dirs).sort()) {
        const fullPath = parentPath ? parentPath + "/" + dirName : dirName;
        html += `<div class="dir" onclick="toggleDir(this)">📁 ${dirName}</div>`;
        html += `<div class="dir-children" style="display:block">${renderTree(dirs[dirName], fullPath)}</div>`;
      }

      for (const file of files.sort().reverse()) {
        const fullPath = parentPath ? parentPath + "/" + file : file;
        html += `<div class="file" data-path="${fullPath}" onclick="openFile('${fullPath}')">📝 ${file}</div>`;
      }
      return html;
    }

    function toggleDir(el) {
      const children = el.nextElementSibling;
      if (children) {
        children.style.display = children.style.display === "none" ? "block" : "none";
      }
    }

    function openFile(path) {
      document.querySelectorAll(".file").forEach(f => f.classList.remove("active"));
      const fileEl = document.querySelector(`.file[data-path="${path}"]`);
      if (fileEl) fileEl.classList.add("active");

      const raw = FILE_CONTENTS[path] || "文件不存在";
      const title = path.split("/").pop().replace(/\.md$/i, "");
      document.getElementById("content").innerHTML =
        `<h1>${title}</h1><hr>` + marked.parse(raw);
      document.title = title + " - 每日记录";
      window.location.hash = encodeURIComponent(path);
    }

    function filterFiles(keyword) {
      keyword = keyword.toLowerCase();
      document.querySelectorAll(".file").forEach(f => {
        const path = f.getAttribute("data-path").toLowerCase();
        f.style.display = path.includes(keyword) ? "block" : "none";
      });
      document.querySelectorAll(".dir-children").forEach(d => {
        d.style.display = keyword ? "block" : "block";
      });
    }

    function toggleTheme() {
      document.body.classList.toggle("dark-theme");
      localStorage.setItem("daily-record-theme", document.body.classList.contains("dark-theme") ? "dark" : "light");
    }

    // Init
    document.getElementById("fileTree").innerHTML = renderTree(FILE_TREE);

    if (localStorage.getItem("daily-record-theme") === "dark") {
      document.body.classList.add("dark-theme");
    }

    // Open from hash
    if (window.location.hash) {
      const path = decodeURIComponent(window.location.hash.slice(1));
      if (FILE_CONTENTS[path]) openFile(path);
    } else if (ALL_FILES.length > 0) {
      openFile(ALL_FILES[0]);
    }
