<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">

  <title>每日记录 - Daily Record Site</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root {
      --bg: #f4f6f8;
      --surface: #ffffff;
      --surface-strong: #f9fafb;
      --line: #d9e0e7;
      --text: #17212b;
      --muted: #607080;
      --accent: #176b5b;
      --accent-soft: #dcefe9;
      --shadow: 0 12px 28px rgba(26,36,46,0.08);
    }
    body.dark-theme {
      --bg: #101820;
      --surface: #17212b;
      --surface-strong: #202b36;
      --line: #344252;
      --text: #edf2f7;
      --muted: #a9b6c4;
      --accent: #45b39d;
      --accent-soft: #183b35;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; overflow: hidden; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: "Microsoft YaHei", "Segoe UI", Arial, sans-serif;
      font-size: 14px;
      line-height: 1.6;
    }
    .app-shell {
      display: grid;
      grid-template-columns: 300px 1fr;
      height: 100vh;
    }
    .sidebar {
      background: var(--surface);
      border-right: 1px solid var(--line);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .sidebar-header {
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      background: var(--surface-strong);
    }
    .sidebar-header h1 {
      margin: 0;
      font-size: 16px;
      color: var(--accent);
    }
    .sidebar-header .meta {
      margin-top: 4px;
      font-size: 11px;
      color: var(--muted);
    }
    .search-box {
      padding: 10px 14px;
      border-bottom: 1px solid var(--line);
    }
    .search-box input {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--bg);
      color: var(--text);
      outline: none;
    }
    .file-tree {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
    }
    .dir, .file {
      padding: 5px 16px;
      cursor: pointer;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .dir:hover, .file:hover { background: var(--accent-soft); }
    .dir { font-weight: 600; color: var(--accent); }
    .file { padding-left: 28px; color: var(--text); }
    .file.active { background: var(--accent-soft); font-weight: 600; }
    .main {
      overflow-y: auto;
      padding: 32px 48px;
      background: var(--bg);
    }
    .content {
      max-width: 900px;
      margin: 0 auto;
      background: var(--surface);
      border-radius: 12px;
      padding: 36px 44px;
      box-shadow: var(--shadow);
    }
    .content h1 { font-size: 26px; border-bottom: 2px solid var(--line); padding-bottom: 12px; }
    .content h2 { font-size: 20px; margin-top: 28px; }
    .content h3 { font-size: 17px; margin-top: 22px; }
    .content table {
      border-collapse: collapse;
      width: 100%;
      margin: 14px 0;
    }
    .content th, .content td {
      border: 1px solid var(--line);
      padding: 8px 12px;
      text-align: left;
    }
    .content th { background: var(--surface-strong); }
    .content code {
      background: var(--surface-strong);
      padding: 2px 5px;
      border-radius: 4px;
      font-family: Consolas, monospace;
    }
    .content pre {
      background: var(--surface-strong);
      padding: 14px;
      border-radius: 8px;
      overflow-x: auto;
    }
    .content pre code { padding: 0; background: transparent; }
    .content blockquote {
      border-left: 4px solid var(--accent);
      margin: 14px 0;
      padding: 8px 16px;
      background: var(--accent-soft);
      color: var(--text);
    }
    .toolbar {
      position: fixed;
      top: 14px;
      right: 18px;
      display: flex;
      gap: 8px;
    }
    .toolbar button {
      padding: 6px 12px;
      border-radius: 6px;
      background: var(--surface);
      border: 1px solid var(--line);
      color: var(--text);
      font-size: 12px;
    }
    .toolbar button:hover { background: var(--accent-soft); }
    .empty-state {
      text-align: center;
      color: var(--muted);
      padding: 80px 20px;
    }
    @media (max-width: 768px) {
      .app-shell { grid-template-columns: 1fr; }
      .sidebar { display: none; }
      .main { padding: 16px; }
      .content { padding: 20px; }
    }
  </style>
</head>
<body>

  <script>
    const FILE_CONTENTS = {"HK1V11/checksum_update_时序图.md": "# CHECK_SUM UPDATE 时序图\n\n## CHPI 写入与 I2C 写任务竞争时序\n\n```\n信号              |  0     0.5T    1T     1.5T    2T     2.5T    3T\n------------------|--------------------------------------------------\nCHPI 帧           |  ~~~~~~~~~~~~~~|~~~~~~~~~~~~~~~|~~~~~~~~~~~~~~~~~~~\n                  |  cfg_frame0   |  无 cfg_frame1 |\n                  |               | (第二次写入)    |\n                  |               |               |\nI2C 写任务        |               |~~~~~~~~~~~~~~~|~~~~\n(内部执行)        |               |  写任务进行中   | 完成\n                  |               |  (耗时 1.25T) |\n                  |               |               |\nI2C_EN            |  ____________ | _____________ |  __________\n(使能信号)        |               |               | /\n                  |       0       |       0       |/  1 (打开)\n                  |               |               |\ncfg_frame 标志    |  ~~~~~~~~~~~~~|               |\n                  |  cfg_frame0=1 |               |\n                  |               |               |\n寄存器写入        |               X               |\n(目标地址)        |          写入生效              |\n```\n\n### 时序说明\n\n| 时间点 | 事件 |\n|--------|------|\n| **1T** | `cfg_frame0` 有效，CHPI 第一次写入目标寄存器；同步触发 I2C 写任务开始执行 |\n| **1T → 2.25T** | I2C 写任务执行中（耗时约 1.25T），期间 I2C_EN 保持为 0 |\n| **2T** | CHPI 第二次写入数据到达，但此时 **没有 cfg_frame1**，无法触发新的帧写入 |\n| **2.25T** | I2C 写任务完成，I2C_EN 拉高（打开），后续 I2C 通路可用 |\n\n### 关键问题\n\n- **2T 时刻**：CHPI 第二次写入时 `cfg_frame1` 缺失，导致该帧数据无法被正确捕获\n- **I2C_EN 滞后**：I2C_EN 在 2.25T 才打开，若第二次写入依赖 I2C 通路则会出现数据通路错误\n- **1T → 2.25T 窗口**：I2C 写任务与 CHPI 帧写入存在 1.25T 的竞争窗口\n", "HK1V11/每周记录.md": "# 每周记录\n\n## 2026-07\n\n### 本周概要 (07/13 - 07/19)\n> 启动 420b 长编码 Normal frame 本地完整帧仿真，确认 DUT 无法识别 K-code IDLE 导致大量错误，用户已接受。\n\n| 模块 | 本周进展 | 状态 |\n|------|---------|------|\n| 420b 长编码 | v2 完成 5 帧 × 16 active + 8 vblank 仿真；v3 按 `t_8b1lane` 参数 + `current_work v3` 帧结构重新搭建 | 🔄 |\n| 公开分享 | 重画 420b 架构图为 SVG，修复页面空白，添加左侧 TOC，同步 LSB-first 结论；完成首页 + 9 章节子页的多页重构；优化 LC_CPUWR 寄存器图解页（目的说明、lightbox、SVG 修复与配色重构） | ✅ |\n| LC_CPUWR | 0714v1 已完成；0716v1 完成 FSEL[1:0] @ 0x35 寄存器变更与归档（RTL + env），并已推送 GitHub | ✅ |\n\n### 详细记录\n- 07/17：为 420b 验证环境新增 raw byte debug 日志 `long_rawbyte_seq_laneN.md`（0717v1）：编码前 raw 数据按 byte 转储（16 字节/行，数据源 reg_q/pixels/vbk/lsp_raw，避免 bit_stream 反推位序歧义），K 码（K1~K4）作为不编码时间标记与字节流按时间交织；纯日志新增，不影响发送逻辑；README debug 文件表与 CHANGELOG v9.5 同步更新。\n- 07/17：定位 420b K-code 异常 \"K1 K2 K2 K1 K2\" 根因：`CHPI_KCODE_ALIGN_LONG_L0.v` 中 `K1_FIND = K1_CODE2 & K1_CODE1_D1 & BK_ST`，`BK_ST` 置位依赖 8B/10B 时序的 `BIT_ALIGN_PT`（或 `R_BKDU&K2_FIND`），420b/8B10B mux 处该信号逻辑未随 420b 更新，`BK_ST` 保持 0 时后续 K1 被与逻辑遮盖；RTL 修复移交俊杰，遗留问题关闭 🔵。\n- 07/15：定位并修复 420b 长编码 LSP 阶段 K-code 异常根因：`isptx_transaction_20260714_v1.sv` 与 driver 中 `type_head` enum 的 420B 部分顺序不一致（transaction 为 K2/K3/K4/K1，driver 为 K1/K2/K3/K4），导致 sequence 发送的 K2/K3/K4/K1 被 driver 错解为 K1/K2/K3/K4，实际波形出现 5 次 `K1 K2` 重复加末尾 `K3 K4`；修改 transaction enum 顺序与 driver 一致后 clean rebuild，case 跑通，LSP K2/K3 被 DUT 正确检测。\n- 07/16：从 `DV_TCON_C/` 同步更新 420b 验证环境文件（transaction/sequence/driver/checker_420b/long_encoding_ref_model/tb.f/case_list）到 `current_work/`，DV_TCON_C 中对应 case 已跑通；将 `current_work/` 备份为 `0716v1/`，工作区内文件名升级为 `0716v2`；\n- 07/16：通过 Plan Mode 完成 FSEL[1:0] @ 0x35 寄存器变更：核对 Excel 确认仅 0x35 新增 FSEL，LC_CPUWR 新增 FSEL 输出并拆分 R_REG53_F，LINK_LOGIC 新增 FSEL 输入并空接，LC_REG_MAPPING 保持不变；在 `LC_CPUWR_history/` 下归档 0714v1 到 `verilog_hdl/`，生成 0716v1 RTL 与 env，更新 README.md/CHANGES.md/changelist.md，并推送 GitHub；修正 FSEL assign 位置到 Part 10 输出赋值区并补 LSI_PRTECT 门控；在 AGENTS.md 中新增 Plan Mode 工作流模板。\n- 07/16：420b 验证环境版本管理（`current_work/` 备份为 `0716v2/`、重命名为 `0717v1/`）；按 PDF spec 在 `0717v1/` 实施帧结构修改：Config Line 单独成行（VACT 后单独发送 `K4+CTRL_F+Dmy+K2`，位置对齐 8B/10B `send_CTRLF_seq(c+1)`）、所有 active line 统一 K2 结束（不再嵌入 K4+CTRL_F）、确认 Dmy 内嵌于 413b/420b 编码对齐；同步更新 `longcode_ver` 的 CHANGELOG/README/验证计划/复用性分析文档。\n- 07/14：完成 LC_CPUWR 0714v1 代码修改与验证：内部 R_REG09/10/31 复位默认值改为 chip_sel=0 的 8'h00；LC_REG_MAPPING 通过写标志实现 chip_sel=1 默认值并回拼字节；LINK_LOGIC 连接写标志/回拼字节；iverilog 语法检查通过；修复注释块与 always 合并导致的语法错误；更新验证环境文件头版本；生成 REVIEW.md；服务器回归 chip_sel=0/1 的 checksum 与 I2C 读回 case 均通过。\n- 07/14：优化 LC_CPUWR 公开文章《寄存器图解 Sheet》：为 5 张图补充目的与 SPEC 对齐说明；为全页面增加图片 lightbox（点击放大、滚轮缩放、拖拽移动）；修复 chip_sel 寄存器映射 SVG 宽度截断；修复 checksum 地址图文字重叠并重构配色（普通地址灰色、差异字段着色）。\n- 07/13：完成 `simulation/local_normal_case_v2` 完整帧仿真，实现 5 帧 × 16 active + 8 vblank 结构；DUT 因无法识别 K1~K2 间 K-code IDLE 导致大量错误；更新 `DATA_REPORT.md`、`CHANGELOG.md`、`simulation/README.md`。\n- 07/13：新建 `simulation/local_normal_case_v3`，发送格式参数参考 `t_8b1lane`（HACT=3840, VACT=16, VBP=4, VFP=5, FRAME_NUM=8, PORT_NUM=12），testbench 结构参考 `longcode_ver/current_work v3`（VBP→VACT→VFP，最后 active line 以 K4+CTRL_F 结束）；Icarus 仿真完成，mismatch 191,794/193,540。\n- 07/13：用 `fireworks-tech-graph` skill 重画 420b 验证架构图与 8B/10B-vs-420B 对比图为 SVG；修复公开文章页面空白问题；添加左侧悬浮 TOC；确认并同步 420b LSB-first 发送顺序到本地 Spec 文档与公开文章。\n- 07/13：将 `team-share-public/hk1v11-longcode-420b-verification` 单页长文拆分为「首页概览 + 9 个章节子页」，首页展示整体框架与模式对比图，章节卡片跳转；更新 `team-share` skill 以支持多页公开文章工作流。\n- 07/13：优化 LC_CPUWR 公开文章《寄存器图解 Sheet》复位域图：补充 N_RST 与 N_RST_NLOCK 的区别说明、RSTN_SCR_EN 加扰复位说明，以及 I2C_EN=1 时通过 `I_TEST_REG_EN` 旁路 N_RST_NLOCK unlock reset 的 RTL 路径说明。\n- 07/13：为公开文章添加常驻顶部导航栏，所有子页滚动时仍可点击切换章节；首页增加作者署名 ymzhuuuu；章节页恢复左侧悬浮 TOC，仅显示当前页标题和本章小节；将所有章节页统一重构为 h2/h3 编号层级以完善 TOC；修复左侧 TOC 滚动时消失问题；添加缓存禁用 meta 标签；新增《HK1V11 LC_CPUWR 代码修改全记录》公开文章，并补充 Register Change 详细寄存器变更、0714v1 chip_sel=1 回拼机制、以及每日记录中的关键实现细节。\n\n### 待解决问题\n- 暂无\n", "HK1V11/每日记录_0421.md": "# 每日记录 - 04/21\n\n### 今日完成\n#### [DV_TCON_C]\n- [模型修正] 修改 I2C 模拟模型中 `bufif0` 的驱动强度，将其调整为 `strong0/weak1`，该修改已与 wangwy 确认。\n- [寄存器整理] 按地址顺序对应寄存器 Excel，修改相关信号复位值及使用的复位信号；总体结构和代码风格保持不变。\n\n  | 项目 | 说明 |\n  |------|------|\n  | 修改对象 | I2C 模拟模型、寄存器复位配置 |\n  | 主要变更 | `bufif0` 驱动强度、信号复位值、复位信号选择 |\n  | 约束 | 不改变总体结构和代码风格 |\n\n### 下一步待做\n- 暂无明确新增待办。\n\n### 发现问题\n- 暂无新增问题。\n\n### 明日计划\n- 暂无明确计划。\n", "HK1V11/每日记录_0430.md": "# 每日记录 - 04/30 (周四)\n\n### 今日完成\n#### [UTC]\n- [架构理解] 理解 UTC 模块整体设计架构。\n- [环境配置] 修改 `isptxenv` 相关配置，按 CaseList 要求实现第一帧/第二帧错误注入逻辑。\n- [Case搭建] 搭建 `unlock_UTC` 测试用例，并完成连续错误检测与帧内统计错误场景验证。\n\n  | Case/场景 | 数量 | 验证目标 | 结果 |\n  |-----------|------|----------|------|\n  | `unlock_utc_00-11` | 4 | 连续错误检测功能 | 通过 |\n  | `unlock_utc_frm_0/1` | 2 | 帧内统计计数错误功能 | 通过 |\n  | `t_8b1lane_unlock_utc_frm_0/1` | 2 | 帧内错误注入场景 | 已新建 |\n\n#### [I2C]\n- [模型开发] 新增 `i2c_data_toggle` 模型，用于验证每次写入和读出数据是否实际生效。\n- [寄存器更新] 按 14 号寄存器大表更新 RTL 设计及仿真验证环境。\n- [Case补充] 新增 2 个 `lastLSI` case，用于验证 `testreg` 区域寄存器在最后写入密码情况下的内部行为。\n- [回归验证] 新建 case 全部通过 checker，已继承 `t_reg_i2c_wr` 用例且运行结果正确。\n\n#### [模拟验证]\n- [模型审阅] 审阅 CHPI 及 I2C 协议模拟行为模型，定位问题并提供解决思路。\n- [协助验证] 协助验证 Analog case，例如 `t_analog_unlock_reset_I2C_EN0`；该部分主要由模拟同事负责。\n\n### 下一步待做\n#### [I2C]\n- [回归跟进] 继续跟进传承至 1V22 项目的 case 回归结果。\n\n### 发现问题\n- [I2C] 传承至 1V22 项目的 case 仍在回归中，需要持续跟踪。\n\n### 明日计划\n- [I2C] 继续观察 1V22 继承 case 的回归结果。\n", "HK1V11/每日记录_0506.md": "# 每日记录 - 05/06 (周三)\n\n### 今日完成\n#### [I2C]\n- [问题排查] 排查 `DBC` / `R_DBC_WIDTH_OPT` 无法改写，以及 `R_REG07_F[7:0]` 被误写的问题，最终定位为环境问题。\n\n  | 问题 | 期望 | 现象 | 结论 |\n  |------|------|------|------|\n  | `DBC` / `R_DBC_WIDTH_OPT` 无法改写 | 可按配置改写 | update 后无法改写 | 定位为环境问题 |\n  | `R_REG07_F[7:0]` 被误写 | 期望 `2'h00` | password enable 后被改写为 `2'h60` | 定位为环境问题 |\n\n- [命名确认] 发现 `reg_lane_ctrl` 与 `reg_r_lane_ctrl` 在格雷码前后命名/mapping 上存在疑问，后续已确认并解决。\n- [环境定位] 与夏鹏排查 DV TCONC 通过 model 发送数据正常、DV 环境通过 RTL 发送数据异常的问题；控制变量后确认相关异常最终为环境问题，验证同事已完成修复。\n\n#### [UTC]\n- [回归验证] 重验 UTC，确认 AutoEQ off 时 UTC 检测失效的异常行为。\n- [逻辑修复] 修改模块逻辑，使 EQ off 场景下恢复 UTC check。\n- [Case补充] 新增 4 个 EQ off 相关 case，用于验证该场景下 UTC 检测行为。\n\n### 下一步待做\n#### [I2C]\n- [问题关闭] `reg_lane_ctrl` / `reg_r_lane_ctrl` 格雷码前后命名问题已确认解决，无需继续挂起。\n\n### 发现问题\n- ~~[I2C] `DBC` / `R_DBC_WIDTH_OPT` 无法改写，`R_REG07_F[7:0]` 被误写~~ → 已定位为环境问题。\n- ~~[I2C] `reg_lane_ctrl` 与 `reg_r_lane_ctrl` 格雷码前后命名/mapping 需确认~~ → 已解决。\n- ~~[UTC] AutoEQ off 时 UTC 检测失效~~ → 已修改逻辑并新增 4 个 case 验证。\n\n### 明日计划\n- [I2C] 继续推进 I2C 相关环境与 case 问题收敛。\n", "HK1V11/每日记录_0507.md": "# 每日记录 - 05/07 (周四)\n\n### 今日完成\n#### [BWD]\n- [Case开发] 新增 `t_8b1lane_unlock_bwdl` case，用于验证 BWDL 功能；从其他 case 移植时发现部分信号缺失，需补充排查。\n- [Case开发] 新增 `t_8b1lane_unlock_bwda` case，用于验证 BWDA 功能。\n- [Case开发] 新增 `t_8b1lane_unlock_bwdb` case，用于验证 BWDB 功能。\n\n  | Case | 验证目标 | 状态 |\n  |------|----------|------|\n  | `t_8b1lane_unlock_bwdl` | BWDL 功能 | 移植后部分信号缺失，需排查 |\n  | `t_8b1lane_unlock_bwda` | BWDA 功能 | 已新增 |\n  | `t_8b1lane_unlock_bwdb` | BWDB 功能 | 已新增 |\n\n#### [I2C]\n- [方案讨论] 与模拟同事讨论 password error reset 的数字设计思路。\n- [设计修复] 修复 I2C only 区域（粉色）寄存器在 password error reset 时未复位的问题，代码已上传并编译通过。\n- [Case补充] 新增 3 个 case 覆盖 I2C only 区域寄存器的 reset 行为。\n\n  | 场景 | 验证目的 |\n  |------|----------|\n  | 最后发送密码 | 验证 password 最后生效时寄存器行为 |\n  | 先发送密码再发送错误寄存器值 | 验证错误写入后的 reset 行为 |\n  | 先发送错误寄存器值最后发密码 | 验证 password 恢复后的寄存器记忆/输出行为 |\n\n### 下一步待做\n#### [BWD]\n- [Case排查] 排查 `t_8b1lane_unlock_bwdl` case 移植后部分信号缺失的问题。\n\n### 发现问题\n- ~~[I2C] 寄存器 30 写入 `0x5A` 后，password 从正确值 `0x72` 切换为任意值时输出应回 default~~ → 已解决。\n- ~~[I2C] password 从任意值恢复为 `0x72` 时，寄存器 30 应重新输出 `0x5A`~~ → 已解决。\n- ~~[I2C] 模拟同事希望清除寄存器值，与数字侧设计冲突~~ → 已按数字设计思路确认，现有设计正确。\n- ~~[I2C] I2C only 区域寄存器 password error reset 时未复位~~ → 已修复并新增 3 个 case 验证。\n- [BWD] `t_8b1lane_unlock_bwdl` case 移植时部分信号缺失导致报错。\n\n### 明日计划\n- [BWD] 继续排查 `t_8b1lane_unlock_bwdl` case 信号缺失问题。\n", "HK1V11/每日记录_0508.md": "# 每日记录 - 05/08 (周五)\n\n### 今日完成\n#### [I2C]\n- [寄存器更新] 按模拟同事 05/07 发送的寄存器大表，更新 CHPI 和 I2C 访问的寄存器逻辑代码。\n\n  | 信号 | 原地址/位域 | 新地址/位域 |\n  |------|-------------|-------------|\n  | `AVE_R` | `0x00[2:0]` | `0x00[7:5]` |\n  | `reg_lane_ck_inv_en` | `0x25[7]` | `0x50[1]` |\n\n#### [帧协议寄存器校验和]\n- [方案设计] 完成视频消隐期寄存器更新的校验和省面积方案讨论，并输出设计文档。\n- [需求梳理] 明确 checksum 更新需求：35 个 8-bit 寄存器参与 XOR 折叠校验，连续 3 帧校验和一致后才更新。\n- [方案优化] 简化实现方式，去掉 FSM，改为 `xor_en = |addr_match` 的流式累加方案，并使用 SOF/EOF 边界信号控制窗口。\n- [模式设计] 新增 `REG_07` 模式开关：`REG_07 == 0x50` 时开启 checksum，否则直写；`REG_07` 自身不参与 XOR。\n- [时序补充] 完善普通模式与 checksum 模式切换时序，并整理验证清单。\n\n  | 方案 | 设计方式 | 面积影响 | 备注 |\n  |------|----------|----------|------|\n  | 方案 A（无影子） | always 块增加 `&& update_en` 门控 | 额外约 19 FF | 建议保留 |\n  | 方案 B（有影子） | 增加完整 shadow 寄存器 | 额外约 304 FF | 面积代价较高 |\n\n### 下一步待做\n#### [帧协议寄存器校验和]\n- [方案确认] 确认最终采用的 checksum 省面积方案，当前建议方案 A。\n- [RTL实现] 根据选定方案完成 RTL 编码。\n\n### 发现问题\n- 暂无新增问题。\n\n### 明日计划\n- [帧协议寄存器校验和] 继续推进方案确认和 RTL 实现。\n", "HK1V11/每日记录_0511.md": "# 每日记录 - 05/11 (周一)\n\n### 今日完成\n#### [综合]\n- [流程跑通] 完成 DC 综合流程：`ckf`、`nlint` 通过后运行 `run_dc`，综合结果正常。\n- [约束修复] 解决 `dont_touch.tcl` 缺失问题，补充约束后重新综合，网表正常输出。\n- [等价验证] 完成 LEC 逻辑等价性检查，`rtl` vs `gate` 对比通过。\n- [时序验证] 完成 `pre_pt` 静态时序分析，timing slack > 0，时序满足要求。\n- [面积分析] 完成面积报告，对比 1V21 / 1V22 项目数据并给出本设计面积分析。\n\n  | 流程 | 结果 |\n  |------|------|\n  | DC | 通过 |\n  | LEC | 通过 |\n  | pre_pt | timing slack > 0 |\n  | 面积报告 | 已完成 |\n\n#### [文档]\n- [文档整理] 整理 Project Integration Flow 综合流程文档。\n\n### 下一步待做\n#### [综合]\n- [流程收尾] 推进网表 signoff release。\n\n### 发现问题\n- [环境] 服务器内除 Qwen 外其余模型均不可用，严重影响工作效率，当前处于 delay 状态。\n\n### 明日计划\n- [综合] 推进网表 signoff release。\n", "HK1V11/每日记录_0512.md": "# 每日记录 - 05/12 (周二)\n\n### 今日完成\n#### [DV_TCON_C]\n- [调试] 协助搭建 `t_all_reg_analog` 的正确 case，解决 `porsd` 不正常拉 1 的问题，问题涉及 SCREN 寄存器相关逻辑。\n- [逻辑确认] 确认 `I2C_EN == 1` 时也不再 reset SCREN 寄存器，该行为已由文裕最终确认。\n\n#### [寄存器修改]\n- [规格同步] 根据寄存器调整要求完成删除项与修改项梳理。\n\n  | 类型 | 信号 | 地址/变更项 | 旧值 | 新值/说明 |\n  |------|------|-------------|------|-----------|\n  | Delete | `SMART_CS[3:0]` | `@0x02[7:6] [3:2]` | - | 删除 |\n  | Delete | `VPS_EN[1:0]` | `@0x03[7] @0x28[6]` | - | 删除 |\n  | Delete | `PDF_EN` | `@0x06[4]` | - | 删除 |\n  | Delete | `PDF_CTRL` | `@0x06[6]` | - | 删除 |\n  | Delete | `R_BWDB_V_OFF` | `@0x23[0]` | - | 删除 |\n  | Delete | `R_LSP_DET_EN` | `@0x50[0]` | - | 删除 |\n  | Modify | `reg_pin_eq_auto[3:2]` | 地址 | `0x02[5:4]` | `0x02[3:2]` |\n  | Modify | `regr_lane_ctrl[4:0]` | default value | `5'b00000` | `5'b11000` |\n  | Modify | `regr_lane_ctrl[4:0]` | description | - | 显示 gray code 前的数据 |\n\n### 下一步待做\n#### [DV_TCON_C]\n- [功能更新] 等待俊杰和 James 讨论后上传 CHECK_SUM UPDATE 功能，再继续推进相关代码更新。\n- [功能更新] 后续一并更新 SCR_EN 在 I2C model 下即使 K3 检测到也不会 reset 的功能。\n\n### 发现问题\n#### [CHECK_SUM UPDATE]\n- [机制问题] 当前 checksum 更新机制与部分信号的即时生效需求存在冲突。\n\n  | 项目 | 说明 |\n  |------|------|\n  | 当前机制 | 写入一个寄存器需要 3 次 CHPI 帧 blank 期间都一致才会更新 |\n  | PORSD/POL 时序冲突 | PORSD/POL 等信号需要在第一帧结束就置位 1 或 0，但 CHECK_SUM 要求 3 帧一致才生效，导致时序不满足 |\n  | ch_sel 响应滞后 | 环境按 `ch_sel` 发送数据时，首次发送 `ch_sel=000`，但寄存器仍为 default value `011`，导致后级模块按 `011` 处理 `000` 的数据 |\n\n### 明日计划\n- [DV_TCON_C] 继续推进 CHECK_SUM UPDATE 和 SCR_EN 功能更新。\n", "HK1V11/每日记录_0513.md": "# 每日记录 - 05/13 (周三)\n\n### 今日完成\n#### [DV_TCON_C]\n- [功能上传] 将 CHECK_SUM UPDATE 功能 bypass 后上传。\n- [功能上传] 上传 SCR_EN 在 I2C model 下即使 K3 检测到也不会 reset 的功能。\n\n#### [I2C]\n- [Case更新] 更新所有 I2C case，使 error case 与 normal case 的寄存器内容匹配 05/12 寄存器大表。\n\n  | 项目 | 说明 |\n  |------|------|\n  | 更新对象 | 所有 I2C case |\n  | 覆盖类型 | error case、normal case |\n  | 参考基准 | 05/12 寄存器大表 |\n\n### 下一步待做\n#### [DV_TCON_C]\n- [机制跟进] 继续跟进 CHECK_SUM UPDATE 机制问题的解决方案。\n\n### 发现问题\n#### [DV_TCON_C]\n- [遗留记录] I2C SCL 信号在仿真中加速后，内部模块解析出错；信号路径经过模拟单元和数字单元，暂未定位问题归属。该问题当前仅记录，不要求立即解决。\n\n#### [CHECK_SUM UPDATE]\n- [机制问题] CHECK_SUM UPDATE 机制问题与 05/12 记录一致，3 帧一致机制与即时生效需求仍存在冲突。\n\n### 明日计划\n- [DV_TCON_C] 继续推进 DV_TCON_C 功能更新。\n- [I2C] 继续推进 I2C case 验证。\n", "HK1V11/每日记录_0514.md": "# 每日记录 - 05/14 (周四)\n\n### 今日完成\n#### [综合]\n- [面积优化] 注释部分功能后重新综合，面积减少约 6K。\n- [时序修复] 修正综合 timing，寄存器模块已达到 timing clean。\n- [逻辑修复] 修复 `lc_cpuwr` 模块时序与逻辑错误，checksum 导致的问题全部解决。\n- [报告输出] 完成新代码更新并输出面积报告。\n\n  | 项目 | 结果 |\n  |------|------|\n  | 面积优化 | 减少约 6K |\n  | 寄存器模块 timing | clean |\n  | `lc_cpuwr` 问题 | 已修复 |\n  | 面积报告 | 已输出 |\n\n### 下一步待做\n#### [综合]\n- [时序收敛] 继续修正其余模块的时序问题。\n\n### 发现问题\n- ~~[综合] 综合后出现 timing violation，定位到 `lc_cpuwr` 模块时序和逻辑错误~~ → 已修复。\n\n### 明日计划\n- [综合] 继续修正其余模块时序。\n", "HK1V11/每日记录_0515.md": "# 每日记录 - 05/15 (周五)\n\n### 今日完成\n#### [CHECK_SUM UPDATE]\n- [面积优化] 删除 `0x20-0x38` 地址段，面积进一步下降，并低于 ORG PLAN 目标。\n- [方案评审] CHECK_SUM UPDATE 方案获得 James 认可。\n- [环境同步] 与验证同事完成沟通，并完成验证环境修改。\n\n  | 项目 | 结果 |\n  |------|------|\n  | 地址段调整 | 删除 `0x20-0x38` |\n  | 面积结果 | 低于 ORG PLAN 目标 |\n  | 方案状态 | James 认可 |\n  | 验证环境 | 已修改完成 |\n\n### 下一步待做\n#### [CHECK_SUM UPDATE]\n- [验证补充] 下周搭建更多 case，进行全面功能验证。\n\n### 发现问题\n- 暂无新增问题。\n\n### 下周计划\n- [CHECK_SUM UPDATE] 搭建更多验证 case。\n- [综合] 继续修正其余模块时序。\n- [综合] 推进网表 signoff。\n", "HK1V11/每日记录_0518.md": "# 每日记录 - 05/18 (周一)\n\n### 今日完成\n#### [CHECK_SUM UPDATE]\n- [Case开发] 针对寄存器 `0x1F` 特殊处理逻辑，创建 8 个 longtest case 进行验证。\n- [问题修复] 检查出代码中存在异常，定位原因为模拟侧修改了 macro 代码，数字侧需要同步修改；当前已完成同步修复。\n- [面积优化] 修改 `LC_CPUWR` 代码，注释掉未使用的 `shadow1F` 寄存器，以优化面积和时序。\n- [跨端同步] 确认模拟侧 macro 修改后，数字侧相关内容已全部对齐；该同步由俊杰完成。\n\n  | 项目 | 说明 |\n  |------|------|\n  | 新增 case | `0x1F` 相关 8 个 longtest case |\n  | 问题来源 | 模拟侧 macro 修改后数字侧未同步 |\n  | 修复状态 | 已同步修复 |\n  | 优化项 | 注释未使用的 `shadow1F` 寄存器 |\n\n### 下一步待做\n#### [CHECK_SUM UPDATE]\n- [功能验证] 继续推进 CHECK_SUM UPDATE 功能验证。\n\n### 发现问题\n- ~~[CHECK_SUM UPDATE] 模拟侧修改 macro 代码后数字侧未同步，导致功能异常~~ → 已修复。\n\n### 明日计划\n- [CHECK_SUM UPDATE] 继续推进功能验证。\n", "HK1V11/每日记录_0519.md": "# 每日记录 - 05/19 (周二)\n\n### 今日完成\n#### [寄存器]\n- [默认值修改] 修改 `reg_kvco_ctrl[3:0]` 默认值，地址为 `@0x26[7:4]`，默认值由 `8` 调整为 `A`。\n- [功能位更新] 更新 `REG07[3:0]` 为 `CTRLF_CHECKSUM[3:0]`，默认值设置为 `5`，用于使能校验和。\n\n  | 信号 | 地址/位域 | 变更 |\n  |------|-----------|------|\n  | `reg_kvco_ctrl[3:0]` | `@0x26[7:4]` | 默认值 `8 → A` |\n  | `REG07[3:0]` | - | 更新为 `CTRLF_CHECKSUM[3:0]`，默认值 `5` |\n\n### 下一步待做\n#### [CHECK_SUM UPDATE]\n- [问题排查] 继续排查 CHECK_SUM 导致 2T 时刻寄存器乱写的问题。\n\n### 发现问题\n#### [CHECK_SUM UPDATE]\n- [机制问题] 发现 CHECK_SUM 导致 2T 时刻寄存器乱写。\n\n  | 阶段 | 行为 | 结果 |\n  |------|------|------|\n  | 1T | 发送 `SCREN=1` | 接收端因 checksum 暂存，未立即生效 |\n  | 2T | 发送端认为解扰已开启并发送加扰数据 | 接收端解扰仍被 checksum 阻塞 |\n  | 错误结果 | 加扰数据直接写入寄存器 | 寄存器值全部错误 |\n\n### 明日计划\n- [CHECK_SUM UPDATE] 继续推进功能验证与机制问题排查。\n", "HK1V11/每日记录_0520.md": "# 每日记录 - 05/20 (周三)\n\n### 今日完成\n#### [CHECK_SUM UPDATE]\n- [方案设计] 完成 checksum 功能更新方案，并与 James 对齐确认 K1 latch 后的数据更新策略。\n\n  | 项目 | 方案 |\n  |------|------|\n  | 默认行为 | `REG_07` 默认值改为 0，使能 checksum 检测 |\n  | 关闭方式 | `data=0x05` 时关闭 checksum 检测，进入直写模式 |\n  | LSP 至 K1 前 | LSP 阶段结束至 K1 发起前不做 checksum，寄存器直写 |\n  | K1 FIND 后 | K1 FIND 后生成 latch；`latch=1` 且 checksum 使能时，所有数据输入均需经过 checksum 验证，通过后才更新寄存器 |\n\n#### [寄存器]\n- [排查] 排查模拟同事反馈的 VBK PDF 功能是否未删除问题，确认相关功能已全部删除。\n\n#### [DV_TCON_C]\n- [验证] 在 PWRC 验证中发现 PWRC 看似在 BKDU 阶段仍会变化，并完成现象分析。\n\n  | 项目 | 结论 |\n  |------|------|\n  | 现象 | PWRC 看似在 BKDU 阶段仍会变化 |\n  | 原因 | 仅删除了寄存器，原逻辑为 `assign a = b & c`，`b` 寄存器删除后等效为 `assign a = c` |\n  | 结论 | PWRC 与 BKDU 呈现相关性，该现象符合当前逻辑 |\n\n#### [UTC]\n- [修复] 修复 env 中直接对 1bit 信号赋 0 导致 K CODE FIND 位置偏移的问题。\n\n  | 项目 | 说明 |\n  |------|------|\n  | 问题原因 | env 直接对 1bit 信号赋 0，导致 K CODE FIND 位置偏移，最佳采样点改变 |\n  | 修复方式 | 改为直接对错误赋值 10bit |\n  | 修复结果 | 最佳采样点位置保持不变，问题解决 |\n\n### 发现问题\n- ~~[寄存器] VBK PDF 功能可能未删除~~ → 排查完成，确认已全部删除。\n- ~~[UTC] UTC 模块 1ps 毛刺干扰~~ → env 由 1bit 赋 0 改为 10bit 赋值，已解决。\n\n### 明日计划\n- [CHECK_SUM UPDATE] 按新方案实现 CHECK_SUM UPDATE 代码修改。\n", "HK1V11/每日记录_0521.md": "# 每日记录 - 05/21 (周四)\n\n### 今日完成\n#### [CHECK_SUM UPDATE]\n- [修复] 解决 2T 时刻乱写寄存器问题，利用 K1 latch 机制保证加扰发送与接收端解扰状态同步，RTL 已更新。\n\n  | 项目 | 说明 |\n  |------|------|\n  | 问题现象 | 2T 时刻出现寄存器乱写 |\n  | 根因 | 1T 发送 `SCREN=1` 被 checksum 暂存，未立即生效；2T 发送端认为解扰已开启并发送加扰数据，但接收端解扰仍被 checksum 阻塞 |\n  | 错误结果 | 加扰数据直接写入寄存器，导致寄存器值全部错误 |\n  | 修复方式 | 加扰数据在首次 K1 之前发送，此阶段 `latch=0`，无 checksum，寄存器直写 |\n  | 修复结果 | 接收端/发送端解扰同步，加扰功能恢复正常，RTL 已更新 |\n\n#### [寄存器]\n- [修改] 将 P2WRC 映射由 `3'b001` 改为 `3'b000`，补齐去年已决定但今日才完成的修改。\n- [修复] 修复 DBC 寄存器因 PDF 寄存器删除而被级联误删的问题。\n\n  | 项目 | 说明 |\n  |------|------|\n  | 原始逻辑 | `assign a = b & c` |\n  | 问题原因 | DBC 功能与 PDF 寄存器关联，PDF 寄存器删除后 DBC 被级联误删 |\n  | 错误表现 | DBC 被错误赋值为 0 |\n  | 修复结果 | DBC 修正为 `1'b1` 独立赋值，KEEPLOW 已实现 |\n\n#### [I2C]\n- [验证] 更新所有 I2C case 环境并执行回归。\n\n### 发现问题\n#### [CHPI_SD_CTRL]\n- [时序偏差] `CHPI_SD_CTRL.v` L487-L496 时序与 SPEC 不符，该问题来自同事代码，需后续同步排查。\n\n  | 条件 | 仿真表现 | SPEC 要求 | 建议/状态 |\n  |------|----------|-----------|-----------|\n  | `W_SEL=0/1` | 仿真差 4 个时钟周期，约 53.8ns | 差值 70ns | 建议增加 1 个时钟周期 |\n  | `W_SEL=2` | 与 `SEL=1` 差 24 个时钟周期，由 case 逻辑决定 | 155-140 约 1 个时钟周期 | 偏差较大，需排查 |\n  | `W_SEL=3` | 待确认 | 待确认 | 需同步排查 |\n\n- ~~[CHECK_SUM UPDATE] CHECK_SUM 导致 2T 时刻寄存器乱写~~ → 利用 K1 latch 机制解决，加扰发送在 `latch=0` 阶段完成，TX/RX 同步。\n- ~~[寄存器] DBC 寄存器因 PDF 删除被级联误删~~ → 已修正，DBC = `1'b1`，KEEPLOW 已实现。\n\n### 明日计划\n- [CHECK_SUM UPDATE] 继续 CHECK_SUM UPDATE 功能验证。\n", "HK1V11/每日记录_0522.md": "# 每日记录 - 05/22 (周五)\n\n### 今日完成\n#### [DV_TCON_C]\n- [排查] 发现 `LD_R=0` 时 STB_A 开始阶段出现在 K2 之前，LD 与 K2 之间存在宽度要求，当前时序未按要求执行。\n- [验证方法] 抓取 `K2_FIND` 与 `TP_ACT0_SET_OK` 两个信号之间的宽度及相对时序位置，并与 SPEC 中 DBC Timing Setting 时序图对比。\n\n#### [I2C]\n- [修复] 排查 I2C_WR_BURST case 输出数据为 X 态的问题，当前仍在修复中。\n\n### 发现问题\n#### [DV_TCON_C]\n- [时序问题] `LD_R=0` 时 STB_A 在 K2 之前开始，LD 与 K2 之间应有宽度间隔，当前实现未满足。\n\n  | 项目 | 说明 |\n  |------|------|\n  | 问题现象 | `LD_R=0` 时，STB_A 开始阶段出现在 K2 之前 |\n  | SPEC 要求 | LD 与 K2 之间应存在宽度间隔 |\n  | 当前验证方式 | 对比 `K2_FIND` / `TP_ACT0_SET_OK` 宽度与 SPEC DBC Timing Setting 时序图 |\n  | 状态 | 继续排查 |\n\n- [行为确认] `EQ_I=3'b000 / AEQ_I=1'b0` 行为暂不判定为错误，需要确认 SPEC 最近是否有修改。\n\n  | 观察项 | 说明 |\n  |--------|------|\n  | 现象 1 | 格雷码编码后数据未输出 |\n  | 现象 2 | `reg_lane_ctrl` 选择 00 通道寄存器数据 |\n  | 当前判断 | 不确定当前行为是否符合最新 SPEC，需进一步确认 |\n\n  | 信号/逻辑 | 追踪结果 |\n  |-----------|----------|\n  | 格雷码编码后数据 | 送往 analog，信号名为 `eq_ctrl[4:0]` |\n  | `regr_lane_ctrl` | `ER_EN ? PRE数据 : 寄存器输入数据`，该值不是格雷码编码 |\n  | PRE 数据 | default = `5'b11000`，追入为 `reg_lane_ctrl_pre_p` |\n  | 寄存器输入数据 | 根据 EQI 选择 `reg_lane_ctrl00/01/10/11` |\n  | EQ 状态机 | 按 SPEC 要求，内部大部分逻辑由 `eq_out` 赋值 |\n  | `eq_out` 后续 | `eq_out → eq_out_pre`，与 goldentime 状态、计数器、`EQ_MODE` 相关 |\n\n### 明日计划\n- [DV_TCON_C] 继续排查 LD_R 与 K2 时序问题。\n", "HK1V11/每日记录_0525.md": "# 每日记录 - 05/25 (周一)\n\n### 今日完成\n#### [模拟]\n- [问题修复] 解决模拟同事反馈的 STB fake 类信号问题，确认 fake 类信号与寄存器 `HIZ_MIN_SEL`、`HIZ_MIN_VAL` 相关。\n\n#### [I2C]\n- [问题修复] 解决 I2C_BURST case 输出 X 态问题，根因是 `I2C_READ` 函数未发送 SLAVE ID，导致 slave 设备无法识别 ID 后的 R/W 信号。\n\n  | 项目 | 说明 |\n  |------|------|\n  | 问题现象 | I2C_BURST case 输出 X 态 |\n  | 根因 | I2C 协议发送流程缺少 SLAVE ID 段 |\n  | 修复方式 | 使用 `I2C_READ_SINGLE` 和 `I2C_READ_BURST` 函数替代原 `I2C_READ` |\n  | 结果 | 问题已修复 |\n\n### 下一步待做\n#### [DV_TCON_C]\n- [问题排查] 继续推进模拟同事反馈的 t_all_reg_analog_line 相关问题排查。\n\n### 发现问题\n#### [DV_TCON_C]\n- [模拟反馈] t_all_reg_analog_line case 中模拟同事反馈 2 个问题；其中 CS=0 问题已确认是旧 MACRO TOP 仿真导致，实际设计无误。\n\n  | 问题 | 当前状态 |\n  |------|----------|\n  | `DPOLINV=1` 时 POL 信号应与 `DPOLINV=0` 时反向，当前未反转 | 待排查 |\n  | `R_CH12&34_HIZ` 功能 fail，仅找到 `R_OHIZ_12&34` 相关寄存器 | 待排查 |\n\n- ~~[I2C] I2C_BURST case 输出 X 态~~ → `I2C_READ` 函数缺少 SLAVE ID 发送，已修复。\n\n### 明日计划\n- [DV_TCON_C] 继续推进遗留问题排查。\n", "HK1V11/每日记录_0526.md": "# 每日记录 - 05/26 (星期二)\n\n### 今日完成\n#### [DV_TCON_C]\n- [验证] 关闭 DPOLINV 问题，确认模拟同事反馈的 DPOLINV 项已 pass，根因是 case 未按 SPEC 构造，并非设计问题。\n- [分析] 深入排查 OHIZ 问题，确认 STB_A 与 STB_B 同时回 high 的设计存在问题。\n\n  | 项目 | 结论 |\n  |------|------|\n  | STB_B high 条件 | `STB_B_PRE` 或 `R_OHIZ_34` |\n  | AABB 设计影响 | `STB_B_PRE` 在 AABB 设计中等效等于 `STB_A` |\n  | 错误表现 | 仅 `OHIZ_12` enable 时，预期只有 Y1/2 与 Y5/6 HiZ，实际 Y3/4 与 Y7/8 也被 HiZ |\n  | 当前判断 | STB_A 与 STB_B 同时回 high 的设计需要继续修复 |\n\n### 发现问题\n- ~~[DV_TCON_C] DPOLINV=1 POL 未反向~~ → case 未按 SPEC 构造导致预期不符，非设计问题。\n- [DV_TCON_C] `OHIZ_12` 使能时 STB_A/B 同时回 high，导致 Y3/4 与 Y7/8 被错误 HiZ。\n\n### 明日计划\n- [DV_TCON_C] 继续跟进 `R_CH12&34_HIZ` fail 修复。\n", "HK1V11/每日记录_0527.md": "# 每日记录 - 05/27 (星期三)\n\n### 今日完成\n#### [DV_TCON_C]\n- [答疑] 梳理 TP_F_AHEAD 与 FAKE 信号行为，回复模拟同事关于提前触发、FAKE 选择及宽度控制的问题。\n\n  | 项目 | 结论 |\n  |------|------|\n  | TP_F_AHEAD 链路 | `TP_F_AHEAD → TP_ACT0_RST_OK / CS_NE → STB_A`，该路径不是唯一链路 |\n  | 提前触发影响 | `TP_F_AHEAD=1` 时提前触发 reset，并影响计数器，间接导致 `STB_A_FAKE` 提前 |\n  | FAKE/Normal 选择 | 由 `HIZ_SEL`、`POL`、`POLC`、`LD_F`、`LD_W` 共同决定，不由 `TP_F_AHEAD` 直接控制 |\n  | LD_F 影响 | `LD_F=1` 时，`POL` 选择 FAKE；`TP_F_AHEAD` 负责提前 `STB_A/STB_A_FAKE` 并传导至 `STB_B` |\n  | FAKE 宽度 | 可通过 `HIZ_MIN_SEL` 与 `HIZ_MIN_VAL` 寄存器设定；未设定时 FAKE 较短，由计数器决定 |\n  | OHIZ 关系 | FAKE 不受 OHIZ 功能影响 |\n\n- [答疑] 明确 AHEAD 值计算与选择逻辑，说明 2B/2D 差距来源、packet 转换关系及寄存器约束。\n\n  | 项目 | 结论 |\n  |------|------|\n  | 基础公式 | 2B 与 2D 差距由 2D 决定，2D 由 `LD_W` 决定，公式为 `2*LD_W + 1` |\n  | 公式含义 | `2*LD_W` 表示 packet 到 clk 的转换；`+1` 表示计数器逻辑判断（packet base） |\n  | 高频场景 | 高频下 2 个 packet 时间很短，AHEAD 值需要向上补 packet |\n  | 寄存器约束 | AHEAD 值需要大于寄存器 `HIZ_MIN_VAL` |\n  | 选择逻辑 | 若 `(2*LD_W + 1 - HIZ_MIN_VAL) < HIZ_MIN_VAL`，选择 `HIZ_MIN_VAL`；否则选择 `2*LD_W + 1 - HIZ_MIN_VAL` |\n\n#### [Checksum Env]\n- [环境修复] 修复 checksum env 中 shadow 寄存器提前一帧提取的问题，明确仿真环境对 CHPI 协议时序理解不足导致 frame 对齐异常。\n\n  | 项目 | 说明 |\n  |------|------|\n  | 问题现象 | 仿真环境提取 shadow 寄存器时总是提前一帧，例如 F2 提取到 F3 的 shadow |\n  | 根因分析 | 仿真环境并不知道 CHPI 协议，错误理解了 `CFG_FRRAME0.TXT` 的发送时机 |\n  | 正确时序 | `CFG_FRRAME0.TXT` 实际会在 LSP 结束的 K4 后发送，而不是在第一个 frame 有效帧后发送 |\n  | 处理结果 | 修复 checksum env 的 shadow 提取时序，使其按 `CFG_FRRAME0.TXT` 的实际发送位置进行处理 |\n\n- [脚本开发] 新增 `run_parallel.py` 脚本，用于并行运行 case，提升 checksum 相关 case 的执行效率。\n\n  | 项目 | 说明 |\n  |------|------|\n  | 脚本用途 | 支持多个 case 并行执行，减少串行运行等待时间 |\n  | 新增接口 | 增加 `time` 输入接口，用于控制并行运行的执行时长 |\n  | 防护效果 | 通过 `time` 参数保证循环能够按预期停止，避免脚本持续运行无法退出 |\n\n- [Case更新] 修改全部 checksum case，将上来前三帧发送的数据改为 default value 的取反值，用于更有效验证 checksum 功能是否真正生效。\n\n  | 项目 | 说明 |\n  |------|------|\n  | 原有方式 | 前三帧直接发送 default value |\n  | 幻觉来源 | `00-08` 寄存器除 `07` 外都有 shadow reg 进行判断；但 `1F` 地址因当前设计 plan 不存在 shadow reg，会直接读取实际寄存器值 |\n  | 存在问题 | 若上来直接发送 default value，`1F` 这类无 shadow reg 地址即使 checksum 机制未正确生效，也可能读到看似正确的 default value，导致前三帧验证存在假通过风险 |\n  | 新验证方式 | 前三帧发送 default value 的取反值 |\n  | 验证目的 | 通过制造与 default value 明确不同的数据，避免 default value 掩盖问题，确认 checksum 功能确实参与并拦截/更新相关寄存器行为 |\n\n- [回归验证] 完成 checksum case 回归，全部 19 个 case 通过，`UVM_ERROR=0`。\n\n  | 项目 | 结果 |\n  |------|------|\n  | PASS | 19 |\n  | FAIL | 0 |\n  | TOTAL | 19 |\n  | UVM_ERROR | 0 |\n  | 短 case | 11 个，耗时 171s ~ 213s |\n  | longest case | 8 个，耗时 264s ~ 303s |\n\n\n### 明日计划\n- [DV_TCON_C] 与俊杰确认 FAKE 信号生成机制。\n", "HK1V11/每日记录_0528.md": "# 每日记录 - 05/28 (星期四)\n\n### 今日完成\n#### [Checksum Env]\n- [回归验证] 对 checksum case 进行回归验证，当前 checksum case 全部通过。\n\n  | 项目 | 结果 |\n  |------|------|\n  | 回归对象 | checksum case |\n  | 回归结果 | 全部通过 |\n  | 当前状态 | checksum 相关回归结果正常 |\n\n#### [I2C]\n- [回归验证] 对朱彦铭创建/维护的 I2C case 进行回归验证（不代表全部 I2C case），初始结果中大部分 case 报告 `UVM_ERROR`，后续定位到其中一类并非真实 error，而是检查逻辑需要区分场景。\n\n  | 项目 | 说明 |\n  |------|------|\n  | 回归对象 | 朱彦铭创建/维护的 I2C case，不代表全部 I2C case |\n  | 初始现象 | 大部分 case 报告 `UVM_ERROR` |\n  | 排查结论 | 部分 error 来自只读寄存器和密码保护寄存器的检查策略，不应直接等同于设计错误 |\n  | 处理方向 | 将符合预期的受限场景从 error 降级为 warning |\n  | 当前状态 | 主要分类回归已完成，结果符合修改预期 |\n\n- [环境修正] 定位到 I2C case 报错的一类原因：环境对只读寄存器也进行检查，但这些只读寄存器可能与模块实际工作状态相关，因此本质不应判定为 error。\n\n  | 项目 | 说明 |\n  |------|------|\n  | 问题类型 | 只读寄存器检查导致 `UVM_ERROR` |\n  | 原因分析 | 只读寄存器值可能受模块工作状态影响，不一定与静态预期值一致 |\n  | 修正方式 | 将该类检查结果由 `UVM_ERROR` 调整为 `UVM_WARNING` |\n  | 当前判断 | 该类问题本质不是 error，后续按 warning 追踪即可 |\n\n- [检查逻辑更新] 将 LSI 密码保护寄存器导致读出 `00` 的情况也调整为 `UVM_WARNING`，并更新 `I2C_REG_CHECK.SVH` 中的寄存器检查函数。\n\n  | 项目 | 说明 |\n  |------|------|\n  | 新增 warning 场景 | LSI 密码保护寄存器导致读出 `00` |\n  | 调整原因 | 该现象由密码保护机制触发，不应直接判定为真实 error |\n  | 函数更新 | 更新 `I2C_REG_CHECK.SVH` 中的寄存器检查函数 |\n  | 判定分类 | 函数现在区分四种结果：只读寄存器 warning、LSI 密码保护 warning、error、correct |\n\n- [回归收敛] 更新朱彦铭创建/维护范围内的 I2C case 分类回归状态，`lconfig`、`fconfig`、`i2cdedicated`、`testreg` 四类已全部跑完，结果均符合本次检查逻辑修改预期。\n\n  | 分类 | 状态 | 结果/备注 |\n  |------|------|-----------|\n  | `lconfig` | 已完成 | 符合修改预期 |\n  | `fconfig` | 已完成 | 符合修改预期 |\n  | `i2cdedicated` | 已完成 | 符合修改预期 |\n  | `testreg` | 已完成 | 符合修改预期 |\n\n### 下一步待做\n#### [I2C]\n- [结果确认] 朱彦铭创建/维护的 I2C 主要分类回归均已完成，后续继续关注该范围内是否还有未覆盖的真实 `UVM_ERROR` 场景。\n- ~~[Warning复核] 复核当前修改后的 `UVM_WARNING` 是否均符合预期，避免将真实错误误降级。~~ → 05/29 已完成 owner 是自己的 I2C case 复核，全部通过，确认 warning 降级符合预期。\n\n### 发现问题\n- [I2C] 已定位两类可降级为 warning 的场景：只读寄存器检查、LSI 密码保护寄存器读出 `00`。05/29 已完成 owner 是自己的 I2C case 复核，全部通过，确认 warning 降级符合预期。\n\n### 明日计划\n- [I2C] 基于 `I2C_REG_CHECK.SVH` 的四类判定结果继续观察后续回归；owner 是自己的 I2C case 已于 05/29 完成复核并全部通过。\n", "HK1V11/每日记录_0529.md": "# 每日记录 - 05/29 (星期五)\n\n### 今日完成\n#### [回归脚本]\n- [脚本优化] 修改并行跑 case 脚本，补强 `delete` 输入场景下的停止与确认逻辑，避免用户输入 `delete` 后脚本无法按预期停止。\n\n  | 项目 | 说明 |\n  |------|------|\n  | 修改对象 | 并行跑 case 脚本 |\n  | 原问题 | 输入 `delete` 后无法停止 |\n  | 修正方式 | 增加多层保护和确认逻辑 |\n  | 交互优化 | 支持用户选择要删除的对象，并通过多轮询问确认 |\n\n#### [I2C]\n- [Warning复核] 完成 owner 是自己范围内 I2C case 的 warning 复核，确认 `I2C_REG_CHECK.SVH` 中只读寄存器检查和 LSI 密码保护寄存器读出 `00` 降级为 `UVM_WARNING` 的处理符合预期；owner 是自己的 case 已全部通过。\n\n  | 项目 | 说明 |\n  |------|------|\n  | 复核范围 | owner 是自己的 I2C case |\n  | 复核对象 | `I2C_REG_CHECK.SVH` warning 分类逻辑 |\n  | 关注点 | 只读寄存器检查、LSI 密码保护寄存器读出 `00` |\n  | 结论 | warning 降级符合预期，owner 是自己的 case 全部通过 |\n\n- [回归验证] 回归 I2C owner 不属于自己的 case，用于观察非本人维护范围内的 I2C case 当前表现。\n\n  | 项目 | 说明 |\n  |------|------|\n  | 回归对象 | I2C owner 不属于自己的 case |\n  | 回归目的 | 观察非本人维护范围 case 的当前状态 |\n  | 范围说明 | 与朱彦铭创建/维护的 I2C case 分开记录，不代表全部 I2C case 的完整结论 |\n\n### 下一步待做\n#### [I2C]\n- [结果确认] owner 是自己的 I2C case 已完成检查并全部通过；后续仅继续观察 owner 不属于自己的 I2C case 回归结果，如发现真实 error 再单独归类跟进。\n\n### 发现问题\n- 暂无新增明确问题。\n\n### 明日计划\n- [I2C] 继续根据回归结果判断是否需要补充问题归类或同步 owner。\n", "HK1V11/每日记录_0601.md": "# 每日记录 - 06/01 (星期一)\n\n### 今日完成\n#### [I2C]\n- [Case维护] 修改 owner 不属于自己的 I2C case，处理寄存器初值长期未同步导致的不匹配问题，并基于 owner 是自己的 case 经验进行迁移。\n- [仿真修复] 修复 `I2C_BURST`、`I2C_DEFAULT` 两个 case 仿真无法停止的问题。\n- [Env修复] 定位部分 case 跑不完的原因是 env 阶段被注释；如不需要相关 checker，则直接将相关 env 信号赋值为 0。\n- [环境优化] 更新 `i2c_env`，将 I2C 时钟频率从 3.7KHz 提升到 11.42KHz，约提升至 3 倍速率。\n- [逻辑修正] 修复部分 case 内循环逻辑错误，避免回归流程异常。\n- [Checker优化] 细化 checker 判定逻辑，将预期内错误调整为 `UVM_WARNING`，不再统一报 `UVM_ERROR`。\n- [回归确认] 补充夜间回归结果：除 3 个 XP 创建/维护的 case 出现 `UVM_FATAL` 外，其余 case 均通过；`ID MISMATCH` 及其内部出现的 16 个 `UVM_ERROR` 符合预期。\n\n### 下一步待做\n#### [I2C]\n- [回归验证] 继续跟进 3 个 XP 创建/维护 case 的 `UVM_FATAL`，确认 phase、延时和时钟加速相关处理是否稳定。\n\n### 发现问题\n- [I2C] owner 不属于自己的 I2C case 长时间未更新，需要继续通过回归收敛。\n- [I2C] 3 个 XP 创建/维护的 case 在夜间回归中出现 `UVM_FATAL`。\n\n### 明日计划\n- [I2C] 定位 3 个 XP 创建/维护 case 的 `UVM_FATAL`。\n", "HK1V11/每日记录_0602.md": "# 每日记录 - 06/02 (星期二)\n\n### 今日完成\n#### [I2C]\n- [问题定位] 定位 3 个 XP 创建/维护的 case 在 I2C 时钟加速后报错的问题，与 reset 阶段前缺少延迟、仿真启动时系统仍处于复位状态有关。\n- [实验验证] 通过调整 phase 阶段，并组合验证前置延时/无延时、时钟加速/不加速等场景，确认问题触发条件和解决方法。\n- [回归确认] 完成 3 个 XP 创建/维护 case 的回归验证，当前结果全部 `PASS`。\n- [复核关闭] XP 已完成复核确认，3 个 XP 创建/维护 case 回归通过，当前无遗留问题。\n- [原因判断] 当前判断底层原因可能与 UVM 竞争或 phase 时序有关，暂不继续深挖。\n\n#### [回归脚本]\n- [超时处理] 更新脚本，修复超时后直接 kill case 导致 VCS 无法打印报告、从而隐藏真实错误的问题。\n- [结果校验] 增加 case 实际 runtime 与脚本记录时间的一致性检查；如二者不一致，脚本会额外报出提示。\n\n### 下一步待做\n#### [I2C]\n- [结果确认] 3 个 XP 创建/维护 case 已完成正式确认和 XP 复核，当前无需继续跟进。\n\n### 发现问题\n- [I2C] 快时钟在 build phase 使用时可能存在竞争；reset phase 前需要增加延迟，否则仿真启动时系统可能仍处于复位状态。\n\n### 明日计划\n- [I2C] 继续观察后续 I2C 回归结果，如无新增异常则保持当前处理。\n", "HK1V11/每日记录_0603.md": "# 每日记录 - 06/03 (星期三)\n\n### 今日完成\n#### [UTC]\n- [case 修复] 修复 4 个 UTC case 的预期帧序判断。\n- [原因定位] 当前验证环境会跳过前三帧检查，因此会额外发送三帧 `frame0`；原 UTC case 仍按旧帧序判断，导致原本预期出现在 `frame2` 的错误也需要整体后移三帧。\n- [验证调整] 将相关 case 的错误判断位置同步后移，保证预期错误与当前环境帧序一致。\n- [回归确认] UTC case 回归已完成，结果正确。\n\n#### [回归脚本]\n- [脚本增强] 修改 `run_parallel.py`，新增多轮交互能力，强制在执行前展示接下来要跑的 case，避免误跑或漏确认。\n- [执行流程] 默认先 `clear simdd` 再 `runvcs`，规避 `bsub` 的 `clean` 参数可能未生效导致环境未清理的问题。\n- [范围控制] 补充 `--exclude` 参数，可直接剔除 I2C 等长时间 case，优先保证短 case 快速出报告。\n- [交付状态] 当前脚本已交付同事使用。\n\n### 发现问题\n- UTC case 预期帧序与验证环境“跳过前三帧检查”的行为不一致，已通过调整预期错误位置修复。\n\n### 明日计划\n- 根据后续回归结果继续处理新增问题。\n- 观察 `run_parallel.py` 在同事侧的使用反馈。\n", "HK1V11/每日记录_0605.md": "# 每日记录 - 06/05 (星期五)\n\n### 今日完成\n#### [AI 使用报告]\n- [报告撰写] 撰写 AI 使用方向报告，围绕每日记录工作流、只读网站布局、项目看板、遗留问题追踪和历史问题搜索追溯进行整理。\n- [内容补充] 根据截图补充只读网站布局、项目看板行动中心、问题雷达和 `checksum` 搜索追溯示例说明。\n- [表达调整] 将报告重点从“网站建设过程”调整为“日常怎么使用、工作流程是什么、使用后带来的追溯价值”。\n\n### 下一步待做\n#### [AI 使用报告]\n- [后续方向] 继续整理第二个 AI 使用方向，保持以实际使用流程和工作价值为主。\n\n### 发现问题\n- 暂无\n\n### 明日计划\n- [AI 使用报告] 继续补充第二个 AI 使用方向的材料。\n", "HK1V11/每日记录_0612.md": "# 每日记录 - 06/12 (星期五)\n\n### 今日完成\n\n#### LC_CPUWR\n\n| 类型 | 事项 | 结果/状态 |\n|------|------|----------|\n| 寄存器搬移 | 完成 5 个信号位段搬移：`reg_cal_result_display_sel`、`reg_ana_test_sel`、`reg_cdr_icp`、`reg_cdr_rlpf`、`R_BAC`，默认值随信号搬移 | ✅ 已完成 |\n| 新增信号 | 新增 8 项信号/寄存器输出：`ACS_EN`、`Level_Skip_frame`、`Skip_frame_count`、`VBK_EN`、`SP_S`、`VBK`、`R_REG09_F`、`R_REG0A_F`；0x09/0A/1D/1E 进帧配置但不参与 XOR 校验和 | ✅ 已完成 |\n| 时钟统一 | 取消 `WCK1_A_TEST`，全模块 85 处统一用 `WCK1_A`，消除跨时钟域同步问题 | ✅ 已完成 |\n| CHIPSEL 隔离 | 明确本层按 CHIPSEL=0 设计，不实现 CHIPSEL=1 的 bit 级语义；09/0A/1F 仅整字节输出 | ✅ 已确定 |\n| FREG_CHPI 映射 | 确定新增地址帧槽公式 `(addr>>1)+1` | ✅ 已确定 |\n| 源码修改 | 完成 `LC_CPUWR_20260612.v` 端口声明、assign 源地址、4 个新地址译码、R_REG23/25/27/28/1F 注释与默认值同步、4 个直写 always 块 | ✅ 已完成 |\n| 文档同步 | 更新 `lccpuwr_modify_plan_20260612.md` §1~§14、同步 `lccpuwr_simulate_plan_20260612.md`、新建 `lccpuwr_regmap_change_list_20260612.md` | ✅ 已完成 |\n\n新增地址帧槽映射：\n\n| 地址 | FREG_CHPI | 数据线 | 共槽 |\n|------|-----------|--------|------|\n| 0x09 | 5'h05 | DATA_D | 与 0x08 |\n| 0x0A | 5'h06 | DATA_C | — |\n| 0x1D | 5'h0F | DATA_D | — |\n| 0x1E | 5'h10 | DATA_C | 与 0x1F |\n\n#### CHECK_SUM\n\n- [死锁分析] 识别 scramble/descramble 状态错配导致的 checksum 死锁：TX 加扰→RX descramble_en 在 checksum 保护范围内无法写入→乱数下永远不匹配。\n- [方案提出] 提出 NG Unlock 双路径方案：正常路径 3 帧连续匹配写入 + 解锁路径 6 帧 checksum 全不同触发强制直写；unlock 生效时机及恢复路径待确认。\n\n### 下一步待做\n\n#### LC_CPUWR\n- [方案写入] 将 NG Unlock 方案写入新 plan 文档（基于 0612 基线复制）。\n- [实现细化] 确定 unmatch_cnt 计数逻辑与 unlock 生效时序细节。\n\n### 发现问题\n\n- [CHECK_SUM] scramble/descramble 错配导致 checksum 死锁，寄存器组永久卡死。已提出 NG Unlock 6 帧不一致解锁方案，实现细节待确认。\n\n### 明日计划\n\n- [CHECK_SUM] 继续讨论并确定 NG Unlock 方案细节，完成后写入新 plan。\n", "HK1V11/每日记录_0615.md": "# 每日记录 - 06/15 (星期一)\n\n### 今日完成\n\n#### LC_CPUWR\n\n| 类型 | 事项 | 结果/状态 |\n|------|------|----------|\n| 文档修正 | 统一修正 0x1F 描述：参与 XOR 校验和但无 shadow；细化 `R_REG1F_F` 更新条件 | ✅ |\n| 文档/代码 | 为 0x09/0A/1D/0x1E 补充 I2C readback 说明，并在 0612 / PlanA / PlanB 三份源码 Part 16 加入对应 case | ✅ |\n| 代码修正 | 修正 NG Unlock Plan B mismatch 计数阈值 off-by-one：上限 `< 3'd6` → `< 3'd5`，置位 `== 3'd5` → `== 3'd4` | ✅ |\n| 代码修正 | 将 `unmatch_cnt_a/t`、`unlock_latch_a/t` 声明从 Part 18 提前到 Part 6，解决 declaration-after-use | ✅ |\n| 验证 | 三份源码（0612、PlanA、PlanB）及对应 `_decimal.v` 均通过 iverilog 语法编译 | ✅ |\n| 决策确认 | 0x38 跳过不改；0x09/0A/1D/0x1E 进帧配置但不参与校验和；Plan B 确定为推荐方案，Plan A 保留为备选 | ✅ |\n| 文档 | 完成代码级变更清单 `lccpuwr_code_changelist_20260615.md`、simulate_plan、modify_plan | ✅ |\n| 归档 | 新建 `LC_CPUWR_history/` 目录，集中存放版本、changelist、计划文件与脚本；补充版本血缘说明与 `README.md` | ✅ |\n\n#### CHECK_SUM\n\n- [阈值修正] Plan B `unmatch_cnt` 上限改为 `< 3'd5`，`unlock_latch` 置位条件改为 `== 3'd4`，即 5 次连续 mismatch（6 帧全不同）后下一帧直写。\n- [方案确认] NG Unlock 最终方案确定为 **Plan B（registered `unlock_latch`）**；Plan A 保留为历史备选。\n\n### 下一步待做\n\n#### LC_CPUWR\n- [待修改] 上层 module 实例化需同步：删除 `WCK1_A_TEST`、新增 9 个输出端口、调整 `R_BAC` 接法。\n\n### 发现问题\n\n- 无新增问题。\n\n### 明日计划\n\n- 完成 LC_CPUWR 上层 module 实例化同步修改。\n", "HK1V11/每日记录_0616.md": "# 每日记录 - 06/16 (星期二)\n\n### 今日完成\n\n#### LC_CPUWR\n\n| 类型 | 事项 | 结果/状态 |\n|------|------|----------|\n| 代码升级 | 创建 `LC_CPUWR_20260616_v2_decimal.v`：0x09/0x0A/0x1D/0x1E 参与 Seg1 checksum 并受 shadow 保护；`VBK_EN` 不再由 LC_CPUWR 输出 | ✅ |\n| 代码升级 | 创建 `LC_CPUWR_20260616_v3_decimal.v`：彻底删除 `CHKSUM_T_EN` 宏及 Seg2（0x20~0x38）checksum 逻辑，代码从约 3280 行精简至约 2060 行 | ✅ |\n| 文档修正 | 更新 `chip_sel0/1_register_address_map.md` 访问属性；修正 0x51 `reg_eq_mode` 注释与复位值一致 | ✅ |\n| 报告 | 创建/更新 `lc_cpuwr_chip_sel0_compliance_report_20260616_v2/v3.md` | ✅ |\n\n#### LC_REG_MAPPING\n\n| 类型 | 事项 | 结果/状态 |\n|------|------|----------|\n| 重写 | 创建 `LC_REG_MAPPING_20260616_decimal.v`：端口十进制化，新增 `R_REG09/10/29/30/31_F`，删除旧 `CHPI_SEL` 切换与死代码 | ✅ |\n| 新增输出 | 新增 `SP_S`/`VBK`/`VBK_EN` 输出（受 `LSI_PRTECT` 掩码保护）；新增 chip_sel=1 专用 `SR_*`/`PWRC_*` 输出 | ✅ |\n| Bugfix | 恢复 `PWRC_DOWN = R_BKDU`：修复固定为 `1'b0` 导致 power-down 分支永不命中的问题 | ✅ |\n| 验证 | 新 `LC_REG_MAPPING_20260616_decimal.v` iverilog 语法检查通过 | ✅ |\n\n#### LINK_LOGIC 与目录归档\n\n| 类型 | 事项 | 结果/状态 |\n|------|------|----------|\n| 代码 | 创建 `LINK_LOGIC_20260616_decimal.v`：同步 LC_CPUWR / LC_REG_MAPPING 端口变更（删除 `WCK1_A_TEST`/`R_REG07_F`/`SSFC`/`R_BAC`，新增互联与空接） | ✅ |\n| 代码 | 将当前版本 Verilog 中文注释全部替换为英文，并用脚本复核无中文字符 | ✅ |\n| 归档 | 建立 `verilog_hdl/` 与 `markdownfile/` 子目录；历史版本 `.v` 与资料归档；清理临时编译产物；更新 `README.md` | ✅ |\n| 验证 | LC_CPUWR v2/v3、LC_REG_MAPPING、LINK_LOGIC 均通过 iverilog 语法检查 | ✅ |\n\n### 关键信号输出责任确认\n\n| 信号 | 输出模块 | 说明 |\n|------|---------|------|\n| `R_BAC` | LC_CPUWR | 0x28[2]，BAC check control |\n| `VBK_EN` | LC_REG_MAPPING | 0x1F[1]，受 `LSI_PRTECT` 掩码保护 |\n| `SP_S[2:0]` | LC_REG_MAPPING | 0x1D，LC_CPUWR 内部生成后通过 `R_REG29_F` 传入 |\n| `VBK[7:0]` | LC_REG_MAPPING | 0x1E，同上 |\n\n### 下一步待做\n\n#### LC_CPUWR\n- [待修改] 上层 module 实例化需同步：删除 `WCK1_A_TEST`、新增 9 个输出端口、调整 `R_BAC` / `VBK_EN` 接法。\n- [待确认] I2C readback 中 0x09/0A/0x1D/0x1E 是否增加 `LSI_PRTECT` 掩码统一策略。\n- [待确认] `CHPI_SEL` 在 LC_CPUWR 内部仍硬编码为 chip_sel=0，chip_sel=1 的 0x09/0A/0x1F 映射待后续处理。\n\n### 发现问题\n\n- 无新增问题。\n\n### 明日计划\n\n- 继续推进 LC_CPUWR 上层 module 实例化同步。\n- 处理 I2C readback LSI_PRTECT 掩码统一问题。\n", "HK1V11/每日记录_0617.md": "# 每日记录 - 06/17 (星期三)\n\n### 今日完成\n\n#### LC_CPUWR 0617_v2\n\n| 类型 | 事项 | 结果/状态 |\n|------|------|----------|\n| 代码 | 发布 `LC_CPUWR_20260617_v2_decimal.v`：I2C 地址字面量与信号名十进制化 | ✅ |\n| 代码 | 创建 `LC_REG_MAPPING_20260617_v2_decimal.v`：`SP_S`/`VBK`/`VBK_EN` 不再受 `LSI_PRTECT` 掩码 | ✅ |\n| 代码 | 创建 `LINK_LOGIC_20260617_v2_decimal.v`：实例化新版 `LC_REG_MAPPING`，删除 `.LSI_PRTECT()` | ✅ |\n| Bugfix | 补声明 `LC_CPUWR` 的 `R_REG29_F`/`R_REG30_F` 输出端口；在 `LINK_LOGIC` 中补连这两个端口 | ✅ |\n| 验证 | 三文件联合 iverilog 语法检查通过 | ✅ |\n\n#### Checksum Case\n\n| 类型 | 事项 | 结果/状态 |\n|------|------|----------|\n| 代码 | 重写 `checksum_sdc_checker.sv`：寄存器名十进制化，检查地址从 9 个扩展到 13 个 | ✅ |\n| 代码 | 同步 18 个 case checker；更新 17 个 test class 数组维度与寄存器名 | ✅ |\n| 代码 | BAC case `cfg_frame` 字段由 `R_BAC` 改为 `VBK_EN`（含 longtest） | ✅ |\n| 文档 | 创建 `case_0617v2_sync_checksum.md`；重写 SDC/PWRC/BAC README；UTC 目录新增 `DEPRECATED.md` | ✅ |\n| 验证 | 脚本复核：18 份 checker 一致、无旧信号名残留、test sv 维度正确 | ✅ |\n\n#### 文档与归档\n\n| 类型 | 事项 | 结果/状态 |\n|------|------|----------|\n| 文档 | 重写 `lccpuwr_code_changelist_20260617_v2.md` 为当前版对比原始版的净差异清单；更新 `README.md` | ✅ |\n| 文档 | 重写 regmapping changelist；更新合规报告分析对象与 I2C 寄存器名 | ✅ |\n| 清理 | 删除临时 official changelist、编译产物及过时 regmapping changelist | ✅ |\n\n### 关键结论\n\n- `SP_S` / `VBK` / `VBK_EN` 输出职责已转移至 `LC_REG_MAPPING`，且不再受 `LSI_PRTECT` 掩码。\n- `R_REG29_F` / `R_REG30_F` 必须声明为 `LC_CPUWR` 输出并在 `LINK_LOGIC` 中显式连接，否则 `SP_S` / `VBK` 悬空。\n- 0617_v2 三件套已统一并通过语法检查。\n- Checksum case 已完成与 0617_v2 RTL 同步：18 份 checker 一致，17 个 test class 维度正确，新增 0x09/0x0A/0x1D/0x1E 检查点，UTC 标记为废弃。\n\n### 下一步待做\n\n#### LC_CPUWR\n- [待验证] 提交 0617_v2 三件套到综合/仿真环境验证。\n- [待确认] 确认 `LOGIC_CENTER` / `HK1V11_digital_top` 是否需同步 0617_v2 端口变更。\n\n#### Checksum Case\n- [待验证] 跑现有 18 个 checksum case 回归，确认 checker 改动未引入回归。\n\n### 发现问题\n\n- [差一风险] 0615 仿真计划描述与 RTL 实现可能存在差一：`unmatch_cnt_a` 在首帧 `match=0` 时也会 +1，NG Unlock case 设计时应动态监测 `unlock_latch_a`，不要硬编码帧号。\n\n### 明日计划\n\n- 新增 `t_8b1lane_checksum_vbk_en_ng_unlock` 专项 case。\n- 在通用 checker 中加入 NG Unlock 监测逻辑并同步到 case 目录。\n", "HK1V11/每日记录_0618.md": "# 每日记录 - 06/18 (星期四)\n\n### 今日完成\n\n#### LC_CPUWR Checksum / NG Unlock\n\n| 类型 | 事项 | 结果/状态 |\n|------|------|----------|\n| 代码 | 修复 `checksum_sdc_checker_0618v1.sv` one-shot unlock 帧内 R_REG 期望判断逻辑 | ✅ |\n| 代码 | 将修复同步覆盖到 19 个 case 的 `checksum_sdc_checker.sv` | ✅ |\n| 文档 | 更新 `case_0618v1_sync_ng_unlock.md` 与 `server_sync_checklist_0618v1.md` 的 checker 修复说明 | ✅ |\n| 验证 | 本地 19 份 checker 与源文件一致性复核；RTL iverilog 语法检查通过 | ✅ |\n| 同步 | 内网服务器 19 份 `checksum_sdc_checker.sv` 与 `cfg_frame*.txt` 同步修正 | ✅ |\n| 验证 | `t_8b1lane_checksum_vbk_en_ng_unlock`、`t_8b1lane_checksum_bac_longtest` 及现有 18 个 checksum case 回归全部通过 | ✅ |\n\n#### NG Unlock 结论\n\n- [根因] one-shot unlock 帧内 `expected[]` 已被提前切换为下一帧 cfg 值，checker 按 `expected[]` 判断当前帧 R_REG，导致误判。\n- [修复] unlock 帧内 R_REG 期望改为当前帧 `shadow`；跳过 shadow 一致性检查；帧末用实际 R_REG 更新 `loaded[]` 基线。\n- [结果] 解决 `t_8b1lane_checksum_vbk_en_ng_unlock` 在 unlock 帧报 `R_REG31_F rreg=00 expected=02` 的问题。\n\n#### I2C case 0617_v2 同步收尾\n\n| 类型 | 事项 | 结果/状态 |\n|------|------|----------|\n| 代码 | 26 个 `i2c_reg_check.svh` 寄存器名十进制化，新增 0x09/0x0A/0x1D/0x1E 分支，I2C 地址改为 0x80~0x86 | ✅ |\n| 代码 | 26 个 `reg_defines_bak.svh` 扩展 FCONFIG 到 14 个地址，更新默认值 | ✅ |\n| 代码 | `t_reg_i2c_unlock_rst.sv` 特殊处理：地址/信号名/默认值表对齐 0617_v2 | ✅ |\n| 文档 | 创建 `case/i2c_modify_0617.md` 完成记录与同步建议 | ✅ |\n| 确认 | 精简服务器同步清单：16 个 `reg_defines.svh` 与 25 个 test `.sv` 无需同步，实际只需 53 个文件 | ✅ |\n| 同步 | 53 个文件已复制到内网服务器对应目录 | ✅ |\n\n### 关键结论\n\n- I2C case 0617_v2 同步已完成并上传服务器。\n- 26 个 `i2c_reg_check.svh` 内容完全相同，可复制 1 份到 26 个目录。\n- 26 个 `reg_defines_bak.svh` 分 5 组，同组内容相同。\n- 16 个 `reg_defines.svh` 因 test.sv 不引用，不需要同步；25 个 test `.sv` 检查无变化，也不需要同步。\n\n### 下一步待做\n\n- [观察] 持续观察 checksum 回归稳定性；后续 RTL 改动时同步评估 checker 是否需要更新。\n- [验证] 在服务器上跑 I2C case 回归仿真，确认 0617_v2 改动在实际环境中通过。\n\n### 发现问题\n\n- [版本同步] 手动拷贝到内网服务器存在版本滞后风险，当前已接受；后续如频繁迭代可考虑改为 symlink 或统一源文件管理。\n- I2C case 0617_v2 同步无新增遗留问题。\n\n### 明日计划\n\n- [观察] 观察 checksum case 回归稳定性，按需同步更新 checker。\n- [归档] 整理 0618v1 最终报告与归档。\n- [验证] 推进 I2C case 服务器回归验证。\n", "HK1V11/每日记录_0622.md": "# 每日记录 - 06/22 (星期一)\n\n### 今日完成\n\n#### 1V11 case 回归验证\n\n完成一轮 HK1V11 case 回归，覆盖 checksum 与 i2c 两大类约 40 个 case。\n\n| 分类 | 结果 | 数量 |\n|------|------|------|\n| checksum case | 全部 PASS | 20 |\n| i2c case | PASS | 19 |\n| FAIL case | 需进一步定位根因 | 5 |\n\n> **NOT_FOUND 说明**：`t_reg_i2c_wr_lconfig` 首次运行 STATUS=NOT_FOUND（截图第 68 行），复跑后 ✅ PASS。\n>\n> **下午回归**：checksum case 回归通过 ✅\n>\n> **RTL 基线**：本次回归基于 6/15–6/16 的 5 条 LC_CPUWR RTL 变更：I2C 地址译码十进制化、Seg2 时钟域统一与 checksum 删除、Seg1 地址扩展与 NG Unlock 机制、LC_REG_MAPPING 输出重构、寄存器位置调整与新增。\n\n#### LC_CPUWR Checksum / K4_FIND 对齐修复\n\n| 类型 | 事项 | 结果/状态 |\n|------|------|----------|\n| 代码 | 修复 `checksum_sdc_checker_0618v1.sv` 帧边界采样偏移：改用 `K4_FIND` 上升沿作为帧边界 | ✅ |\n| 代码 | 移除 `cfg_frame` 的 `+1` 偏移：frame `fid` 加载 `cfg_frame{fid}` | ✅ |\n| 代码 | 新增辅助函数 `read_k4_find()` / `read_update_en()` / `read_chksum_mode()` | ✅ |\n| 代码 | `monitor_frames()` 结构调整：`env_cfg.frame_num` 解释为总帧数，循环改为 `fid < frame_num`，最后一帧为 `frame_num-1`；`K4_FIND` 作为每帧入口，首个无条件等待，后续 100us 超时报 `UVM_ERROR`；`apply_cfg_frame(fid)` 放在每个 `K4_FIND` 之后、`frame_end_a` 之前；最后一帧 `frame_end_a` 上升沿 50us 超时报 `UVM_WARNING` | ✅ |\n| 代码 | 修复 50us 超时补丁中的命名块冲突：最后一帧 fork 改名为 `wait_fe_pos_last`，避免 `Identifier previously declared` 编译错误 | ✅ |\n| 同步 | 覆盖 19 个 case 的 `checksum_sdc_checker.sv` | ✅ |\n| 服务器验证 | 全部 checksum case 通过 | ✅ |\n| 代码 | `t_8b1lane_checksum_sdc` / `t_8b1lane_checksum_sdc_longtest` 的 `cfg_frame*.txt` 中 `SDC` 字段改为 `VBK_EN`，匹配 0618_v1 寄存器位变更 | ✅ |\n| 文档 | 更新 `case_0618v1_sync_ng_unlock.md` 与 `server_sync_checklist_0618v1.md` | ✅ |\n\n#### K4_FIND 对齐结论\n\n- [根因] 原 checker 用 `frame_end_a` 计数并 `apply_cfg_frame(fid+1)`，导致 F5 检查时实际采样到 F6 的 `R_REG` 值。\n- [修复] 以 `K4_FIND` 上升沿作为帧边界；`cfg_frame{fid}` 与 frame `fid` 一一对应；`loaded[]` 在第一个 `K4_FIND` 处同步。\n\n### 发现问题\n\n本轮回归共有 5 个 FAIL case（截图第 78 / 95 / 96 / 101 / 102 行），需进一步定位：\n\n| 截图行 | case | UVM_ERROR | UVM_FATAL | 问题类型 |\n|--------|------|-----------|-----------|----------|\n| 78 | t_reg_i2c_wr_testreg_lastLSI | 0 | >0 | i2c testreg lastLSI 异常终止 |\n| 95 | t_reg_i2c_wr_default | 3 | 0 | i2c 默认值检查失败 |\n| 96 | t_reg_i2c_rst | 2 | 0 | i2c 复位行为异常 |\n| 101 | t_reg_i2c_unlock_rst | 16 | 0 | i2c unlock 复位异常 |\n| 102 | t_reg_i2c_w_id_mismatch | 20 | 0 | i2c 写 ID 不匹配处理异常 |\n\n- `t_reg_i2c_wr_testreg_lastLSI`：根因为 case 目录下 test `.sv` 被误替换为 `.checker` 文件，恢复正确 test 文件后 PASS。\n- [K4_FIND 采样] 修改 `cfg_frame6.txt` 的 `VBK_EN` 0→1 后，暴露 checker 帧边界采样晚一帧的问题；本地已修复，待上传服务器验证。\n\n### 下一步待做\n\n| 模块 | 事项 | 优先级 |\n|------|------|--------|\n| LC_CPUWR Checksum | 上传 K4_FIND 对齐后的 checker 到内网服务器，跑 `vbk_en_ng_unlock`（`cfg_frame6 VBK_EN=1`）确认 F5=00/F6=02 | 高 |\n| LC_CPUWR Checksum | 跑其余 18 个 checksum case 回归，确认 cfg 索引偏移不影响原有 case | 高 |\n| I2C | 提取 5 个 FAIL case 的详细日志，定位失败场景与信号 | 中 |\n| I2C | 确认 FAIL 是否与 0618_v1 / i2c 0617_v2 修改相关 | 中 |\n| I2C | 优先排查 `t_reg_i2c_wr_testreg_lastLSI` 的 UVM_FATAL | 中 |\n| I2C | 下午启动 I2C case 回归，当前正在跑 | 🔄 |\n| LC_CPUWR | 5 条 6/15–6/16 RTL 变更（I2C 译码、Seg2/Seg1、REG_MAPPING、寄存器位置）仍处于“等待验证”状态 | 高 |\n| LC_CPUWR | 确认 checksum 下午回归通过是否已覆盖上述 5 条变更 | 高 |\n| case 环境 | 5 条变更均标注“需要修改 case 环境”，case 适配进度待确认 | 中 |\n\n### 明日计划\n\n- 内网服务器验证 K4_FIND 对齐后的 checker。\n- 继续分析 5 个 FAIL i2c case 的日志，输出初步根因分类。\n- 与 owner 确认 `t_reg_i2c_unlock_rst` 的期望值是否需要随 0617_v2/0618_v1 更新。\n\n---\n\n## 附录：完整 PASS 结果\n\n### checksum case PASS 列表\n\n| case | UVM_ERROR | UVM_FATAL | 状态 |\n|------|-----------|-----------|------|\n| t_8b1lane_checksum_bac | 0 | 0 | ✅ PASS |\n| t_8b1lane_checksum_pwrc | 0 | 0 | ✅ PASS |\n| t_8b1lane_checksum_pwrc_n1 | 0 | 0 | ✅ PASS |\n| t_8b1lane_checksum_pwrc_n2 | 0 | 0 | ✅ PASS |\n| t_8b1lane_checksum_pwrc_n3 | 0 | 0 精确换算 IDLE（K5~K8）长度 | 中 |\n| CHPI / 420b | 确认 V blanking 行数是否含 setting_line | 低 |\n\n---\n\n### 发现问题\n\n- 无新增阻塞问题；420b 发送方向已按 MSB-first 修复并同步到 driver。\n\n---\n\n### 明日计划\n\n| 模块 | 事项 |\n|------|------|\n| I2C checker | 跟进 case 回归结果 |\n| 项目流程 | 继续推进 0707v1/0708v1 服务器回传与验证 |\n| CHPI / 420b | 跟进 420b 基础 case 回归结果 |\n", "HK1V11/每日记录_0709.md": "# 每日记录 - 07/09 (周四)\n\n### 今日完成\n\n#### LC_CPUWR / HDL\n\n| 类型 | 事项 | 结果/状态 |\n|------|------|----------|\n| 版本迭代 | 当前 HDL `LC_CPUWR` / `LC_REG_MAPPING` / `LINK_LOGIC` 发布为 0709v1，0708v1 归档至 `verilog_hdl/` | ✅ |\n| 服务器同步 | 用服务器版本替换本地 `HDL/` 与 `DV_TCON_C/` | ✅ |\n| 验证环境 | `checker_for_checksum.sv` RTL baseline 同步为 0709v1 | ✅ |\n\n### 下一步待做\n\n| 模块 | 事项 | 优先级 |\n|------|------|--------|\n| DV_TCON_C | 0709v1 checksum / I2C 读回 case 回归 | 高 |\n| LC_CPUWR | 0709v1 服务器回传确认 | 中 |\n\n### 发现问题\n\n| 模块 | 问题 | 影响 | 状态 |\n|------|------|------|------|\n| LC_CPUWR | `LINK_LOGIC` 0709v1 与 0708v1 存在 header/端口差异，回归已确认无功能异常 | 低 | 🔵 |\n\n### 明日计划\n\n| 模块 | 计划事项 |\n|------|----------|\n| LC_CPUWR | 0709v1 后续版本迭代准备 |\n| DV_TCON_C | 持续维护 case 环境 |\n", "HK1V11/每日记录_0710.md": "# 每日记录 - 07/10 (星期四)\n\n### 今日完成\n\n#### longcode 冒烟测试\n\n| 类型 | 事项 | 结果 |\n|------|------|------|\n| 搭建 | 创建 Icarus 本地冒烟测试环境 (v1~v4)，覆盖 LSP+Payload 单帧+5帧 | ✅ |\n| DUT 修复 | descrambler LFSR 时序 (`lfsr_k1`→`lfsr_key`) | ✅ v1 |\n| DUT 修复 | 位反转补偿 (descrambler 前后各加组内反转) | ✅ v1 |\n| DUT 修复 | decoder 替换 pattern (`{1'b0,tag}`→`{tag,1'b0}`) + 位反转检查 | ✅ v1 |\n| DUT 修复 | 幽灵 valid 门控 (`din_valid_gated`) → 5帧 169错→1错 | ✅ v2 |\n| DUT 修复 | 部分字节输出 (≥8/≥16) → LSP byte11 修复 | ✅ v4 |\n| ENV 修复 | SV 参考模型编码顺序 (replace→scramble 改为 scramble→replace) | ✅ v3 |\n| ENV 修复 | tag 选择改为基于 scrambled prefix | ✅ v3 |\n| ENV 修复 | testbench `scramble_en` 时序 + `bit_reverse_byte` + `received_cnt` 竞态 | ✅ v1 |\n\n#### 版本测试结果\n\n| 测试 | 原始DUT | v1 | v2 | v4 |\n|------|---------|-----|-----|-----|\n| LSP 单帧 | 全错 | 1错(byte11) | 1错(byte11) | **PASS** |\n| Payload 单帧 | 全错 | PASS | PASS | PASS |\n| Payload 5帧 | — | 169错 | 1错(byte123) | 1错(byte123) |\n\n#### 420b 数据流完整分析\n\n**编码侧: 420 bit 怎么组成的**\n\nSpec (`CHPI_420b`): \"输入413比特，输出420比特\"\n\n```\n420 bit = 7 bit header + 413 bit data\n       = 21 包 × 20 bit/包\n\n第 1 包 (pack_20b_cnt=0, tag_pack=1):\n  bit[6:0]  = header: {tag[5:0], toggle}\n  bit[19:7] = 13 bit 数据\n\n第 2~21 包 (pack_20b_cnt=1~20):\n  bit[19:0] = 20 bit 数据\n\n数据量验证: 13 + 20×20 = 13 + 400 = 413 ✓\n```\n\n**解码侧: decoder_7b 怎么收**\n\n| 条件 | HDL 位置 | 加多少 bit | 取哪些位 |\n|------|---------|-----------|---------|\n| `tag_pack && decode_en` | `decoder_7b.v:217` | +13 | `din_20b_aligned[19:7]` |\n| `decode_en && half_valid` | `decoder_7b.v:221` | +10 | `din_20b_aligned[9:0]` |\n| `decode_en && !K2/K3` | `decoder_7b.v:225` | +20 | `din_20b_aligned[19:0]` |\n\n**解码侧: 7-bit 组怎么切**\n\n| 条件 | HDL 位置 | 出几组 | 减多少 bit |\n|------|---------|--------|-----------|\n| `raw_data_num >= 21` | `decoder_7b.v:174` | 3 (valid=3) | -21 |\n| `raw_data_num >= 14` | `decoder_7b.v:179` | 2 (valid=2) | -14 |\n| `raw_data_num >= 7` | `decoder_7b.v:184` | 1 (valid=1) | -7 |\n\n**解码侧: 7-bit 组→24-bit 字节打包**\n\n| 条件 | HDL 位置 | 出几字节 | 减多少 bit |\n|------|---------|---------|-----------|\n| `dec_data_num >= 24` | `long_decoding_top.v:212` | 3 (byte0~2) | -24 |\n| `dec_data_num >= 16` | `long_decoding_top.v:212` (v4新增) | 2 (byte0~1) | -16 |\n| `dec_data_num >= 8` | `long_decoding_top.v:212` (v4新增) | 1 (byte0) | -8 |\n\n**LSP 59 组完整累加追踪**\n\n```\ndecoder_7b 侧(group→dout_21b_valid)  │  long_decoding_top 侧(组→字节)\n                                     │\nraw=13 → 切1组(余6)  dout: valid=1   │  +7bit  → dec_data_num=7   (<24,不输出)\nraw=6+20=26→切3组(余5) dout:valid=3  │  +21bit → dec=28 → 输出24 → 余4   bytes 0,1,2\nraw=5+20=25→切3组(余4) dout:valid=3  │  +21bit → dec=25 → 输出24 → 余1   bytes 3,4,5\nraw=4+20=24→切3组(余3) dout:valid=3  │  +21bit → dec=22 → 不输出         ← 跳跃！\nraw=3+20=23→切3组(余2) dout:valid=3  │  +21bit → dec=43 → 输出24 → 余19  bytes 6,7,8\nraw=2+20=22→切3组(余1) dout:valid=3  │  +21bit → dec=40 → 输出24 → 余16  bytes 9,10,11 ← byte11!\nraw=1+20=21→切3组(余0) dout:valid=3  │  +21bit → dec=37 → 输出24 → 余13  bytes 12,13,14\nraw=0+20=20→切2组(余6) dout:valid=2  │  +14bit → dec=27 → 输出24 → 余3   bytes 15,16,17\nraw=6+20=26→切3组(余5) dout:valid=3  │  +21bit → dec=24 → 输出24 → 余0   bytes 18,19,20\nraw=5+20=25→切3组(余4) dout:valid=3  │  +21bit → dec=21 → 不输出         ← 跳跃！\nraw=4+20=24→切3组(余3) dout:valid=3  │  +21bit → dec=42 → 输出24 → 余18  bytes 21,22,23\nraw=3+20=23→切3组(余2) dout:valid=3  │  +21bit → dec=39 → 输出24 → 余15  bytes 24,25,26\nraw=2+20=22→切3组(余1) dout:valid=3  │  +21bit → dec=36 → 输出24 → 余12  bytes 27,28,29\nraw=1+20=21→切3组(余0) dout:valid=3  │  +21bit → dec=33 → 输出24 → 余9   bytes 30,31,32\nraw=0+20=20→切2组(余6) dout:valid=2  │  +14bit → dec=23 → 不输出\nraw=6+20=26→切3组(余5) dout:valid=3  │  +21bit → dec=44 → 输出24 → 余20\nraw=5+20=25→切3组(余4) dout:valid=3  │  +21bit → dec=41 → 输出24 → 余17\nraw=4+20=24→切3组(余3) dout:valid=3  │  +21bit → dec=38 → 输出24 → 余14\nraw=3+20=23→切3组(余2) dout:valid=3  │  +21bit → dec=35 → 输出24 → 余11\n... (后续同理，不再列出)\n```\n\n### 下一步待做\n\n| 模块 | 事项 | 优先级 |\n|------|------|--------|\n| longcode | 修复 5帧 byte 123: 标签假阳性 (scrambled prefix 与 tag 冲突) | 中 |\n| 日报 | 更新周报 | 低 |\n\n### 发现问题\n\n| 归属 | 问题 | 根因 | 状态 |\n|------|------|------|------|\n| DUT | descrambler LFSR 偏移 | data_pre1 用 lfsr_k1 非 lfsr_key | ✅ v1 |\n| DUT | 位反转 | 420b MSB先发 vs DUT LSB先存 | ✅ v1 反转补偿 |\n| DUT | 5帧 LFSR 漂移 | dout_21b_valid 滞后1拍→幽灵valid | ✅ v2 门控 |\n| DUT | **LSP byte 11** | dec_data_buf batch跳跃+>>24截断 1bit偏差 | ✅ v4 |\n| DUT | 5帧 byte 123 | scrambled prefix与tag冲突→假阳性替换 | ❌ |\n| ENV | SV 顺序错误 | replace→scramble 应为 scramble→replace | ✅ v3 |\n| ENV | scramble_en 竞态 | tb posedge后才置位→DUT采样到0 | ✅ v1 |\n\n#### DUT byte 11 详细分析\n\nbyte 11 在 `dec_data_num=43` 输出后的批次里。这一轮的输入来自 decoder 的 `raw_data_num`=3→23→切3组(valid=3) 这个 group batch。\n\n累积过程：\n```\n上一轮余 19 bit（来自 batch 4 输出后的 >>24 截断）\n+ 本轮 21 bit（3 组 × 7）\n= 40 bit\n→ 输出 24 bit = bytes 9,10,11\n→ 余 16 bit\n```\n\n`dec_data_buf >> 24` 截断时，`dec_data_buf[23:0]` 被取为输出，`dec_data_buf[41:24]` 右移成新余数。但 batch 3 跳跃（22<24 未输出）导致那 22 bit 未被截断，累积到 43 bit 后才做 `>>24`。\n\n**关键**：正常每 3 batch 输出一次（28→25→22→43→40→37→...），batch 3 的跳跃打乱了 7-bit 组边界和 24-bit 输出边界的对齐关系。跳跃的那次，`dec_data_buf_pre = dec_data_buf`（不右移），下一轮再加 21 bit 后整体右移 24。这个不右移→整体右移的切换，让截断线和 7-bit 组边界差了 1 bit。\n\n具体到 byte 11（输出 batch 的第 3 个字节）：\n```\nByte 11 = dout_24b[23:16] = dec_data_buf[23:16]\nbit23~16 来自：余 19 的高位 + 新 21 的低位\nbit16~18 = 前余[16:18], bit19~23 = 新组[0:4]\n                              ↑ 这个边界差了 1 bit\n```\n\n这就是为什么 31 字节正确、唯独 byte 11 错 1 bit。v4 修复：新增 `>=16→2bytes`, `>=8→1byte` 的**部分字节输出**，在 batch 3 (22 bit) 时出 2 字节 (16 bit)，不再跳跃，>>16 截断线与 7-bit 边界对齐。\n\n**为什么 8b10b 不受影响**：8b10b 没有 7-bit 分组、没有 24-bit 批量输出、没有 dec_data_buf 累加。\n\n### 明日计划\n\n| 模块 | 事项 |\n|------|------|\n| longcode | 修复标签假阳性 (tag 冲突) |\n| longcode | 出 v4 完整报告 |\n", "HK1V11/每日记录_0713.md": "# 每日记录 - 07/13 (周一)\n\n### 今日完成\n\n#### 420b 长编码 Normal frame 本地仿真\n\n| 类型 | 事项 | 结果/状态 |\n|------|------|----------|\n| 环境 | 从 `HDL/HK1V11_digital_top/long_encoding/` 重新提取 DUT，仅加 debug | ✅ |\n| 参考模型 | 保持 LSB-first 6 点修改，`replace_cnt==0` 保留 `tag=6'b100000` | ✅ |\n| Testbench | 实现 5 帧 × 16 active line + 8 vblank line，1024 bytes/line 完整帧序列 | ✅ |\n| 仿真 | Icarus Verilog 跑通，按区域统计 mismatch | ✅ |\n| 报告 | 更新 `DATA_REPORT.md`、`CHANGELOG.md`、`simulation/README.md` | ✅ |\n\n#### 420b 长编码 local_normal_case_v3\n\n| 类型 | 事项 | 结果/状态 |\n|------|------|----------|\n| 环境 | 新建 `simulation/local_normal_case_v3`，DUT 从 v2 复制（仅 debug） | ✅ |\n| 参考模型 | 在 v2 LSB-first 参考模型上扩展 `encode_with_70b_alignment` | ✅ |\n| Testbench | 参考 `current_work v3` 帧结构，参考 `t_8b1lane` 参数（HACT=3840, VACT=16, VBP=4, VFP=5, FRAME_NUM=8, PORT_NUM=12） | ✅ |\n| 仿真 | Icarus Verilog 跑通，完成跨帧结构 | ✅ |\n| 报告 | 生成 `DATA_REPORT.md`，更新 `CHANGELOG.md`、`simulation/README.md` | ✅ |\n\n---\n\n### 发现问题\n\n#### 错误分布（单帧典型值）\n\n| 区域 | 字节数 | 错误数 | 正确数 | 说明 |\n|------|--------|--------|--------|------|\n| INIT_CTRL_F | 60 | 1 | 59 | byte 38 固定错误：期望 `0x26`，收到 `0x22` |\n| FRAME_START | 60 | 1 | 59 | 同为 byte 38 固定错误 |\n| Active line 0 | 1024 | 773 | 251 | 前 251 bytes 正确，之后被 IDLE K-code 污染 |\n| Active line 1~15 | 1024×15 | 1023×15 | 1×15 | 仅首字节正确 |\n| FRAME_END | 60 | 59 | 1 | 几乎全错 |\n| Vblank line 0~7 | 1024×8 | 759~769 | 255~265 | 全 IDLE 段被当数据解码 |\n\n#### 错误逻辑\n\n1. **DUT 无法识别 K-code IDLE**\n   - `decoder_7b` 在 `K1`/`K4` 与 `K2` 之间持续把所有 420-bit 输入当 payload 解码，没有跳过 K-code 的逻辑。\n   - 因此 active line 视频数据后紧跟的 1024 bytes K-code IDLE 被当作有效数据继续解码，污染后续输出。\n\n2. **第一条 active line 前 251 bytes 正确，后续漂移**\n   - K1 后的初始阶段，decoder 状态干净，能正确恢复视频前 251 bytes。\n   - 一旦 K-code IDLE 进入，decoder 的加扰器/替换状态被污染，导致同一条 line 剩余数据及后续 line 基本全部错误。\n\n3. **FRAME_END 几乎全错**\n   - `K4 + FRAME_END(60B)` 后的 IDLE 同样被持续解码，60 bytes 中仅 1 byte 正确。\n\n4. **Vblank 被当数据解码**\n   - 8 条 vblank line 全是 K1 + IDLE + K2 + IDLE，但 decoder 不区分 payload 与 IDLE，mismatch 稳定在 759~769，说明错误模式相对规律。\n\n5. **INIT_CTRL_F / FRAME_START 主体结构正确**\n   - 60 bytes 中仅 byte 38 固定出错，说明配置包/帧起始包主体解码正确，但存在一处固定的编码/解码差异（可能与 `tag` 或 `toggle` 边界有关）。\n\n#### 当前正确的内容\n\n- 帧时序、K-code 发送顺序、参考模型 LSB-first 逻辑与 DUT 初步对齐。\n- `INIT_CTRL_F` / `FRAME_START` 主体结构正确（59/60 bytes 匹配）。\n- 第一条 `active line` 前 251 bytes 正确。\n- `K2` 前用 K-code IDLE 比用 420b 编码 zeros 更优：后者会导致 `FRAME_START` 和 active lines 全部输出为 0，已回退。\n\n#### 团队知识库 / 公开分享\n\n| 类型 | 事项 | 结果/状态 |\n|------|------|----------|\n| 图表 | 用 `fireworks-tech-graph` skill 重画 420b 架构对比图、验证环境架构图为 SVG，解决乱码 | ✅ |\n| 网站 | 更新 `team-share-public` 文章，图片引用改为 SVG | ✅ |\n| 网站 | 修复 Markdown 渲染空白问题（改用 `text/template` 避免 JS 转义错误） | ✅ |\n| 网站 | 添加左侧悬浮大纲索引（TOC），支持滚动高亮与移动端抽屉 | ✅ |\n| 网站 | 将单页长文拆分为「首页概览 + 9 个章节子页」，首页突出框架/结构，详情通过卡片跳转 | ✅ |\n| Skill | 更新 `team-share` skill，补充多页拆分工作流（landing + chapters） | ✅ |\n| 网站 | 添加常驻顶部导航栏，所有页面滚动时导航可见，点击可跳转到任意章节 | ✅ |\n| 网站 | 首页增加作者署名 ymzhuuuu，去掉来源行 | ✅ |\n| 网站 | 章节页恢复左侧悬浮 TOC；左侧 TOC 仅显示当前页标题和本章小节，不跨页面 | ✅ |\n| 网站 | 将所有章节页统一重构为 `h2`/`h3` 编号层级，左侧 TOC 完整显示二级、三级标题 | ✅ |\n| 网站 | 修复左侧 TOC 滚动时消失问题：让 TOC wrapper 撑满容器高度，sticky TOC 随页面滚动始终可见 | ✅ |\n| 网站 | 新增公开文章《HK1V11 LC_CPUWR 代码修改全记录》，基于 `LC_CPUWR_history` 整理 6 个章节 | ✅ |\n| 网站 | 读取 `3.HK1V11_changelist.xlsx` 中「Register Change」sheet，将详细寄存器变更同步更新到 LC_CPUWR 文章 | ✅ |\n| 网站 | 根据 `LC_CPUWR_20260714_v1_changelist.md` 更新 0714v1 chip_sel=1 默认值实现机制（LC_REG_MAPPING 回拼） | ✅ |\n| 网站 | 根据 0612~0714 每日记录补充 LC_CPUWR 文章细节：checksum 死锁、NG Unlock 修复、checker 数组越界、K4_FIND 帧边界、cfg_frame 解析一致性等 | ✅ |\n| 网站 | 为所有页面添加 `Cache-Control` / `Pragma` / `Expires` 缓存禁用 meta 标签，减少刷新依赖 | ✅ |\n| 网站 | LC_CPUWR 复位域图补充 N_RST/N_RST_NLOCK 区别与 RSTN_SCR_EN 加扰复位说明 | ✅ |\n| 网站 | LC_CPUWR 复位域图补充 I2C_EN=1 关闭 N_RST_NLOCK unlock reset 的 RTL 路径说明 | ✅ |\n\n#### 420b Spec 理解\n\n| 类型 | 事项 | 结果/状态 |\n|------|------|----------|\n| 确认 | 重新确认 420b 发送顺序为 LSB-first（bit0 先发） | ✅ |\n| 文档 | 更新 `longcode_ver/longcode_spec_understanding.md`，补充 Header/toggle/tag 位序与 DUT tag 提取说明 | ✅ |\n| 文档 | 同步更新公开文章中的发送方向描述 | ✅ |\n\n---\n\n### 下一步待做\n\n| 模块 | 事项 | 优先级 |\n|------|------|--------|\n| 420b 长编码 | 待用户决策：继续小调提升匹配率，或接受当前错误归档 | 中 |\n\n---\n\n#### 420b 帧结构最后一帧 CTRL_F 越界确认\n\n- `send_420b_ctrl_f_data(frame_num + 1)` 与 8B/10B `send_CTRLF_seq(c+1)` 行为一致，保持原样。\n- 补注释说明：最后一帧缺 `cfg_frame{frame_num}.txt` 时 `process_line()` 静默跳过，不修改行为。\n\n---\n\n### 明日计划\n\n- 根据用户决策继续优化 testbench 或整理最终报告。\n- 继续完善 LC_CPUWR 公开文章可视化细节。\n- **寄存器默认值更新**（待办）。\n\n\n---\n\n### 备注\n\n- 用户已确认“有错是正常的”，当前错误可接受。\n- v2：单帧 mismatch 约 22,320，5 帧总 mismatch 约 111,600。\n- v3：总 mismatch 191,794 / 193,540；K4 后 descrambler 关闭导致跨帧数据无法解扰，与 v2 的“DUT 无法识别 K-code IDLE”结论一致。\n", "HK1V11/每日记录_0714.md": "# 每日记录 - 07/14 (星期一)\n\n### 今日完成\n\n#### SV参考模型 LSB修正\n\n| 事项 | 状态 |\n|------|------|\n| 编码顺序 scramble→replace | ✅ |\n| Tag基于scrambled prefix | ✅ |\n| 发送顺序 MSB→LSB | ✅ |\n| 头部{toggle,tag}→{tag,toggle} | ✅ |\n| 替换组{tag,type}→{type,tag} | ✅ |\n| wire concat反转→LSB线序 | ✅ |\n| DUT检查{tag_value,1'b0}→{1'b0,tag_value} | ✅ |\n| decode函数缺j编译bug修复 | ✅ |\n\n#### sequence/driver LSB同步\n\n| 事项 | 状态 |\n|------|------|\n| LSP bit推送方向修正 | ✅ |\n| build_bit_stream_from_bytes LSB | ✅ |\n| pixel/vblank注释修正 | ✅ |\n| ref model全部MSB注释→LSB | ✅ |\n\n#### LC_CPUWR (0714v1)\n\n| 事项 | 状态 |\n|------|------|\n| 0x09/0x0A/0x1F 复位默认值改为 8'h00 | ✅ |\n| 写标志实现 chip_sel=1 默认值回拼 | ✅ |\n| LINK_LOGIC 连接写标志/回拼 | ✅ |\n| iverilog 语法检查通过 | ✅ |\n| 修复注释块语法错误 | ✅ |\n| checker/scoreboard/agent 文件头同步 | ✅ |\n| 服务器回归 chip_sel=0, 0x09/0x0A/0x1F=0x00 | ✅ |\n| 服务器回归 chip_sel=1, 0x09/0x0A/0x1F=0xFF/0xA5/0xAA | ✅ |\n| 服务器回归 chip_sel=1 checksum 匹配 | ✅ |\n| 0714v1 REVIEW.md 生成 | ✅ |\n\n#### 版本管理\n\n| 事项 | 状态 |\n|------|------|\n| 0713v1归档 | ✅ |\n| 0713v2备份(LSB修正版) | ✅ |\n| CHANGELOG v7.1 | ✅ |\n| spec理解文档重写 | ✅ |\n| README更新 | ✅ |\n\n#### 回传准备\n\n| 事项 | 状态 |\n|------|------|\n| REVIEW.md生成 | ✅ |\n\n#### LC_CPUWR 公共文章（team-share-public）\n\n| 事项 | 状态 |\n|------|------|\n| 寄存器图解页 5 张图补充目的/SPEC 对齐说明 | ✅ |\n| 全页面图片增加 lightbox（放大/缩放/拖拽） | ✅ |\n| 修复 chip_sel 寄存器映射 SVG 宽度截断 | ✅ |\n| 修复 checksum 地址图文字重叠 | ✅ |\n| checksum 图配色重构（普通地址灰色、差异字段着色） | ✅ |\n\n### 下一步待做\n\n| 事项 | 优先级 |\n|------|--------|\n| 标签假阳性修复 | 中 |\n| 服务器回传+回归 | 高 |\n| LC_CPUWR：确认顶层模块切到 sw_reg_lane_ctrl 端口 | 中 |\n| LC_CPUWR：清理 i2c_model.sv 旧 HV1V11 层级与 hex 映射 | 低 |\n\n### 发现问题\n\n| 归属 | 问题 | 状态 |\n|------|------|------|\n| DUT | 标签假阳性 | ❌ |\n| ENV | sequence/driver残留MSB注释 | ✅ 已修复 |\n\n### 明日计划\n\n| 事项 |\n|------|\n| 标签假阳性修复 |\n| 服务器回传 longcode + LC_CPUWR |\n| 继续完善 LC_CPUWR 公共文章可视化细节 |\n", "HK1V11/每日记录_0715.md": "# 每日记录 - 07/15 (星期三)\n\n### 今日完成\n\n#### 420b 长编码 K-code 异常诊断\n\n| 类型 | 事项 | 结果/状态 |\n|------|------|----------|\n| 问题定位 | 分析 LSP 阶段 DUT 未检测到 K2/K3 的现象 | ✅ |\n| 根因确认 | 发现 `type_head` enum 在 transaction 与 driver 中 420B 顺序不一致 | ✅ |\n| 代码修复 | 修改 `isptx_transaction_20260714_v1.sv` 中 420B enum 顺序为 K1/K2/K3/K4 | ✅ |\n| 验证 | clean rebuild 后 case 跑通，LSP K2/K3 正确 | ✅ |\n| 同步 | 从 `DV_TCON_C/` 同步更新 420b env 文件到 `current_work/`，DV_TCON_C case 已跑通 | ✅ |\n| 版本归档 | `current_work/` 备份为 `0716v1/`，工作区内文件名升级为 `0716v2` | ✅ |\n\n---\n\n### 发现问题\n\n#### 420B `type_head` enum 顺序不一致导致 K-code 路由错位\n\n**现象**：\n\nLSP 阶段本应是 `K2 K3 K2 K3 K2 K3 K2 K3 K2 K3`，但实际波形为 `K1 K2 K1 K2 K1 K2 K1 K2 K1 K2 K3 K4`；\n`send_420b_lsp()` 在 320.248us 发送 K2，但 driver 日志显示收到 K1。\n\n**根因**：\n\n`isptx_transaction_20260714_v1.sv` 与 `isptx_driver_20260714_v1.sv` 中 420B enum 顺序不一致。\n\n- transaction/sequence 顺序：`K2_420B, K3_420B, K4_420B, K1_420B`\n- driver 顺序：`K1_420B, K2_420B, K3_420B, K4_420B`\n\n由于 `tr.id` 传输的是整数值，driver 按照自己的 enum 解析，导致同样的 id 被路由到错误的 K-code task。\n\n**映射错位示例**：\n\n| sequence 意图 | sequence 设置的 `tr.id` | driver 解析的类型 | driver 实际驱动 |\n|--------------|------------------------|------------------|----------------|\n| 发 K2 | `TYPE_DRV_K2_KEY_420B` | `TYPE_DRV_K1_KEY_420B` | `tr.k1_420b` = K1 |\n| 发 K3 | `TYPE_DRV_K3_KEY_420B` | `TYPE_DRV_K2_KEY_420B` | `tr.k2_420b` = K2 |\n| 发 K4 | `TYPE_DRV_K4_KEY_420B` | `TYPE_DRV_K3_KEY_420B` | `tr.k3_420b` = K3 |\n| 发 K1 | `TYPE_DRV_K1_KEY_420B` | `TYPE_DRV_K4_KEY_420B` | `tr.k4_420b` = K4 |\n\n**波形解释**：\n\n`send_420b_lsp()` 循环 5 次，每次 `K2 + data + K3`。driver 侧 5 次循环被错解为 `K1 K2` 重复 5 次，即 `K1 K2 K1 K2 K1 K2 K1 K2 K1 K2`；\nLSP 结束后 `send_420b_ctrl_f_line(0)` 发 K4，被 driver 错解为 K3；\n随后 `send_ppm_420b()` 第一行发 K1，被 driver 错解为 K4；\n因此观察到末尾 `K3 K4`。\n\n**状态**：✅ 已修复并验证通过（transaction enum 已改为与 driver 一致：K1/K2/K3/K4；case 已跑通）。\n\n---\n\n### 下一步待做\n\n| 模块 | 事项 | 优先级 |\n|------|------|--------|\n| 420b 长编码 | clean rebuild（SV enum 值编译期确定，必须清缓存重编） | 高 |\n| 420b 长编码 | 确认仿真实际引用的是 `current_work` 还是 `DV_TCON_C` 路径，必要时同步修改 | 高 |\n| 420b 长编码 | 重新抓取 LSP + 帧头波形，验证 K2/K3/K4/K1 顺序正确 | 高 |\n\n---\n\n### 明日计划\n\n| 模块 | 计划事项 |\n|------|----------|\n| 420b 长编码 | 验证 LSP 阶段 K2/K3 正确输出，DUT 能正常检测 |\n| 420b 长编码 | 继续调试 frame 阶段 K-code 与数据 payload 对齐 |\n\n### 备注\n\n- 本次修改仅更新了 `longcode_ver/current_work/isptx_transaction_20260714_v1.sv`。\n- 若仿真 filelist 指向 `DV_TCON_C/top/agents/isprx_env/isptx_agent/isptx_transaction.sv`，需要将该同步也应用过去。\n", "HK1V11/每日记录_0716.md": "# 每日记录 - 07/16 (星期四)\n\n### 今日完成\n\n#### LC_CPUWR 寄存器变更\n\n| 类型 | 事项 | 结果/状态 |\n|------|------|----------|\n| 变更评估 | 核对 Excel 寄存器表，确认仅 0x35 新增 FSEL[1:0] 一项变更 | ✅ |\n| RTL 修改 | LC_CPUWR 新增 FSEL[1:0] 输出端口，R_REG53_F 拆分为 FSEL + Reserved | ✅ |\n| RTL 修改 | LINK_LOGIC 新增 FSEL[1:0] 输入端口并空接，LC_REG_MAPPING 不变 | ✅ |\n| 版本归档 | 将 0714v1 RTL 移入 `verilog_hdl/`，生成 0716v1 当前版本 | ✅ |\n| 环境归档 | 新建 `current_env/`，生成 0716v1 reg_model/env_cfg/checker/reg_define | ✅ |\n| 规范修正 | 将 FSEL assign 从端口声明区移到 Part 10 输出赋值区，并补 LSI_PRTECT 门控 | ✅ |\n| 文档更新 | 新建 0716v1 changelist，更新 README.md 与 CHANGES.md | ✅ |\n| GitHub | 当前变更已推送到 `https://github.com/ymzhuuuuufz0313l/HK1V11` | ✅ |\n\n#### 工作流规范\n\n| 类型 | 事项 | 结果/状态 |\n|------|------|----------|\n| 流程沉淀 | 在 `.kimi/AGENTS.md` 与 `AGENTS.md` 中新增 Plan Mode 工作流模板 | ✅ |\n| Git 配置 | 配置全局 user.name / user.email，并修正提交作者信息 | ✅ |\n\n#### longcode 420b 验证环境\n\n| 类型 | 事项 | 结果/状态 |\n|------|------|----------|\n| 版本管理 | `current_work/` 备份为 `0716v2/`（含 debug），重命名为 `0717v1/` 并升级文件名 | ✅ |\n| 帧结构修改 | Config Line 单独成行：VACT 后单独发送 `K4+CTRL_F+Dmy+K2` | ✅ 待仿真 |\n| 帧结构修改 | 所有 active line（含最后一行）统一以 K2 结束，不再嵌入 K4+CTRL_F | ✅ 待仿真 |\n| Spec 确认 | Config Line 的 Dmy 确认内嵌于 413b/420b 编码对齐，结构无需变更 | ✅ |\n\n---\n\n### 发现问题\n\n#### FSEL assign 初始位置不符合 LC_CPUWR 代码规范\n\n**现象**：最初将 `assign FSEL[1:0] = R_REG53_F[1:0];` 放在模块端口声明之后、内部寄存器声明之前。\n\n**根因**：LC_CPUWR 中所有寄存器字段输出赋值统一集中在 `Part 10: Register Bit Field Output Assignment`，按地址顺序排列，并带 `LSI_PRTECT` 门控。\n\n**修正**：将 FSEL assign 移到 0x33 与 0x36-0x37 输出之间，改为 `assign FSEL[1:0] = LSI_PRTECT ? R_REG53_F[1:0] : 2'b00;`。\n\n**状态**：✅ 已修正并重新推送 GitHub。\n\n#### 420b K-code 序列出现异常 \"K1 K2 K2 K1 K2\"\n\n**现象**：driver 侧偶发两个 K2 后接一个 K1，预期应为一个 K2 一个 K1。\n\n**排查**：已在 sequence/driver 两侧增加 per-lane K-code 序列日志（`long_kcode_seq/drv_laneN.md`）。\n\n**状态**：⏳ 待 0717v1 仿真后用日志复核（帧结构修改后可能已消除）。\n\n---\n\n### 下一步待做\n\n| 模块 | 事项 | 优先级 |\n|------|------|--------|\n| longcode 420b | 仿真验证 0717v1 帧结构，用 kcode 日志复核 K-code 序列 | 高 |\n| longcode 420b | 与 Spec 确认 K3 使用条件（DUT 中 K4 关解扰、仅 K3 重新使能） | 中 |\n| LC_CPUWR | 根据项目节奏，决定是否将 0716v1 归档副本同步到 `HDL/` 工作区 | 中 |\n| LC_CPUWR | 根据项目节奏，决定是否将 0716v1 env 同步到 `DV_TCON_C/` 工作区 | 中 |\n\n---\n\n### 明日计划\n\n| 模块 | 计划事项 |\n|------|----------|\n| 待确认 | 根据用户下一步指令确定 |\n\n### 备注\n\n- 本次变更严格限定在 `LC_CPUWR_history/` 下，`HDL/` 与 `DV_TCON_C/` 工作区未修改。\n- FSEL 当前在 LINK_LOGIC 内部空接，未连接到顶层模拟模块。\n", "HK1V11/每日记录_0717.md": "# 每日记录 - 07/17 (星期五)\n\n### 今日完成\n\n#### longcode 420b 验证环境\n\n| 类型 | 事项 | 结果/状态 |\n|------|------|----------|\n| Debug 增强 | 新增 `long_rawbyte_seq_laneN.md`：编码前 raw 数据按 byte 转储（LSP/CTRL_F/CTRL_L/Video/VBK） | ✅ 待仿真 |\n| Debug 增强 | K 码（K1~K4）作为不编码时间标记，与字节流按时间交织，可核对各 region 原始字节与 K 码时刻 | ✅ 待仿真 |\n\n---\n\n### 发现问题\n\n#### 420b K-code 异常 \"K1 K2 K2 K1 K2\" 根因已定位 ✅\n\n**根因**：RTL 420b/8B10B mux 处部分信号逻辑未随 420b 更新。`CHPI_KCODE_ALIGN_LONG_L0.v` 中：\n\n```verilog\nassign K1_FIND = K1_CODE2 & K1_CODE1_D1 & BK_ST;  // K2/K3/K4 无 BK_ST 门控\n```\n\n`BK_ST` 由 `BIT_ALIGN_PT | (R_BKDU & K2_FIND)` 置位、由 `K1_FIND` 清零。`BIT_ALIGN_PT` 源自 8B/10B 的 `CHPI_SD_CTRL` 数据结束时序，420b 行结构下置位时序不匹配时，`BK_ST` 保持为 0，后续 K1 被 `& BK_ST` 与逻辑遮盖，表现为 K1 偶发丢失。\n\n**处理**：RTL 修复由俊杰负责（07/17 移交），遗留问题已关闭 🔵。\n\n---\n\n### 下一步待做\n\n| 模块 | 事项 | 优先级 |\n|------|------|--------|\n| longcode 420b | 仿真验证 0717v1（帧结构 + rawbyte 日志），复核 K-code 序列 | 高 |\n| longcode 420b | 与 Spec 确认 K3 使用条件（DUT：K4 关解扰、仅 K3 重新使能） | 中 |\n\n---\n\n### 明日计划\n\n- 根据仿真结果分析 rawbyte/kcode 日志，复核帧尾 `K2 → K4+CTRL_F+Dmy+K2` 结构（K-code 异常已定位为 RTL 问题，由俊杰修复）。\n\n### 备注\n\n- 本次 debug 为纯日志新增，不改变任何发送逻辑/时序/LFSR 状态。\n- 字节取自源头（reg_q/pixels/vbk/lsp_raw），避免 bit_stream 反推的位序歧义。\n", "HK1V11/规则_日报内容范围.md": "# 日报内容范围规则\n\n> 本规则由用户于 2026/06/30 明确指定，适用于 HK1V11 项目日报记录。\n\n## 只记录真正的功能工作\n\n日报应局限于以下三类内容：\n\n1. **RTL code**：RTL 设计、修改、审查、验证、bugfix\n2. **Case**：测试 case 创建 / 修改 / 回归 / 调试\n3. **环境**：直接影响仿真或 bring-up 的验证环境改动\n\n## 不记录以下内容\n\n- 脚本内部实现细节（改了什么参数、怎么重写、加了什么选项）\n- 文档-only 更新（`CHANGES.md`、`REVIEW.md`、内部笔记等）\n- 非公开的、项目管理类、不对外交付的辅助性工作\n\n## 例外\n\n若某项脚本 / 文档改动与功能结果强耦合（例如新增 case 必须同步到 `case_list.txt` 才能被回归调用），只写功能结果，不写文件编辑细节。\n", "HK1V11/遗留问题.md": "# 遗留问题\n\n| 日期 | 模块 | 问题描述 | 状态 | 关闭日期 |\n|------|------|---------|------|---------|\n| 07/13 | 寄存器 | 寄存器默认值需要更新 | 🔵 | 07/14 |\n| 07/16 | longcode 420b | K3 使用条件待与 Spec 确认（DUT：K4 关解扰，仅 K3 重新使能） | 🟡 | |\n| 07/16 | longcode 420b | K-code 序列偶发 \"K1 K2 K2 K1 K2\"。根因：RTL 420b/8B10B mux 部分信号逻辑未更新，`CHPI_KCODE_ALIGN_LONG_L0` 中 `K1_FIND = K1_CODE2 & K1_CODE1_D1 & BK_ST`，BK_ST 由 `BIT_ALIGN_PT`(8B/10B 时序) 或 `R_BKDU&K2_FIND` 置位、K1_FIND 清零；420b 下置位逻辑不匹配时后续 K1 被该与逻辑遮盖。由俊杰处理 RTL 修复 | 🔵 | 07/17 |\n\n## 说明\n\n- 🔴 高优先级 / 阻塞\n- ⚠️ 风险 / 外部依赖\n- 🟡 待确认 / 低风险观察\n- 🔵 已解决 / 已关闭\n", "HV2M23/每周记录.md": "# 每周记录\n\n## 2026-06\n\n### 本周概要 (06/29 - 07/03)\n> 主线：完成 DRD case 命名统一、cyclic 系列补齐与服务器回传前检查，同步修复 23 个 case 的 `define DRDOD 遗漏。\n\n| 模块 | 本周进展 | 状态 |\n|------|---------|------|\n| DRD Checker | 完成 input/output checker 规划，确定分阶段落地路线 | ✅ |\n| DRD Checker | 实现 P0 `drdod_output_monitor` + `drdod_output_scoreboard`，SV 内嵌参考模型 | ✅ |\n| DRD Checker | 3 个试点 case 已启用 output checker | ✅ |\n| DRD Checker | 修复 cyclic 系列 input checker 采样时序，`t_drdod_cyclic_2lane_BOE1_C` PASS | ✅ |\n| DRD case 管理 | 修复 `t_drdod_en_toggle_2lane_HKC1_R` `force` 编译错误 | ✅ |\n| DRD case 管理 | 完成 23 个 case 重命名，统一为 `t_drdod_<function>_<lane>_<panel>_<color>` | ✅ |\n| DRD case 管理 | 新建 10 个 cyclic case（2P/1P/hit），DRD 有效 case 总数达 33 | ✅ |\n| DRD case 管理 | 修复 23 个现有 case 的 `user_def.sv`，补齐 `` `define DRDOD `` | ✅ |\n| 服务器验证 | 生成 `REVIEW.md` 回传检查清单，准备送入服务器验证 | ✅ |\n| 项目清理 | 删除根目录 `tests/`，清理 `DV_TCON_C/top/tests/` 废弃脚本与临时产物 | ✅ |\n| 项目配置 | 创建 `.kimi/AGENTS.md`，删除无用 `.claude/settings.local.json` | ✅ |\n\n### 详细记录\n\n#### 07/01 周三 - [详情](每日记录_0701.md)\n- **DRD Input Checker 修复**: 定位并修复 `t_drdod_cyclic_*` input checker 持续 mismatch；通过临时 debug 确认 2P 模式下每个像素在 `DATAI_L0/L1` 上稳定 2 个 `DTCLK` 周期，修正 `drdod_input_monitor.sv` 为 skip 3 个周期后每 2 个 `DTCLK` 采样一次；`t_drdod_cyclic_2lane_BOE1_C` 已 PASS。\n- **编译修复**: 修复 `t_drdod_en_toggle_2lane_HKC1_R.sv` 中 `force` 语句 RHS 直接使用 `rx_cfg.OD_k` 导致的 VCS `DTINPCNS` 错误，改为本地 `bit[2:0]` 缓存后再 force。\n- **Smoke/Cyclic 期望区分**: 在 `env_cfg.sv` 新增 `drdod_cyclic_mode` 字段（由 `DRDOD_CYCLIC` 宏控制），修复 smoke case 打开 input checker 后仍按 cyclic 期望检查导致的 mismatch。\n- **文档同步**: 更新 `CHANGES.md` 记录上述修复。\n\n#### 06/30 周二 - [详情](每日记录_0630.md)\n- **服务器验证准备**: 生成 `REVIEW.md` 回传检查清单，确认 10 个 cyclic case、23 个 `user_def.sv` 修复、`case_list.txt` 更新均已完成；33 个 DRD case 全部启用 `` `define DRDOD ``。\n- **cyclic case 收尾**: 06/29 新建的 10 个 cyclic case（2lane×6、1lane×2、hit×2）已就位并补齐缺失文件，DRD 有效 case 总数达 33。\n- **服务器部署**: case + support 文件上传服务器，删除 `ppm_drd/` 共享池，清空所有 DRD case 的 `ppm_ref.txt`。\n- **编译问题修复**: 修复 `isptx_sequence.sv` 中 `` `ifdef/`else `` 在函数参数中的语法问题；修复 `drdod_output/input_scoreboard.sv` 中 `if/else` 与 UVM 宏的冲突。\n- **编译通过**: 33 个 DRD case 在服务器端全部编译通过。\n- **功能验证**: `t_drdod_smoke_2lane_BOE1_R` 在 checker 打开的情况下运行并 PASS。\n- **遗留问题**: GOA dual-gate 架构理解问题仍待后续处理；Cyclic 波形验证待执行。\n\n#### 06/29 周一 - [详情](每日记录_0629.md)\n- **DRD Checker 规划**: 从 HDL 端口视角梳理 DRD 相关 case 的 input/output checker 需求，确认优先实现 output bypass/enable checker。\n- **DRD Checker 实现**: 新增 `drdod_output_monitor` + `drdod_output_scoreboard`，检查 `DRDOD_EN`/`LOD_EN` 组合逻辑及 2P bypass 输出等于输入；在 `env_cfg` / `checker_agent` / `tb.f` 中集成。\n- **DRD Checker 试点**: 在 `t_drdod_smoke_2lane_BOE1_R` / `t_drdod_disable_2lane_BOE1_off` / `t_drdod_no_match_2lane_panel0_R` 打开 `drd_output_check_on`；更新 `create_drd_case.py` 模板默认启用。\n- **DRD case 重命名**: 经 plan mode 确认规则 `t_drdod_<function>_<lane>_<paneltype>_<color>`，完成 23 个 case 重命名及内部文件同步。\n- **目录清理**: 删除根目录 `tests/`；清理 `DV_TCON_C/top/tests/` 下 20+ 个废弃脚本与仿真临时产物；保留 `t_8b1lane_SHL0`、`t_8b2lane` 及共享 PPM 池。\n- **验证计划更新**: 基于循环数据改造计划，在 `DRD_OD_verification_plan.md` / `DRD_OD_case_structure.md` 中新增 `cyclic`（6 个 2P + 2 个 1P）与 `cyclic_hit`（2 个）共 10 个 case 规划；不删除现有 case；总有效 case 数更新为 33。\n- **DRDOD 数据循环化**: 将 `drdod_data_gen.svh` 中单色/双色固定值改为按像素循环递减；新增 `drdod_cyclic_desc()` / `drdod_get_color_values_per_pixel()`；同步更新 `new_panel_remap_plan/drdod_data_gen.svh`。\n- **DRD Input Checker**: 新增 `drdod_input_monitor` + `drdod_input_scoreboard`，逐像素验证 DUT 输入 `DATAI_L0/L1` 符合循环规则；在 3 个试点 case 启用。\n- **文档同步**: 更新 `CHANGES.md`、`AGENTS.md`、`.kimi/AGENTS.md`、`README.md` 及 `markdown_drdod/` / `new_panel_remap_plan/` 相关文档。\n\n### 待解决问题\n- 06/29 新增：待回归验证 3 个试点 case 的 checker 行为；smoke 与 cyclic（BOE1_C）已 PASS， --|\n| Python 环境 | 安装 Python 3.13.13 到 `D:\\Python\\Python313` | ✅ 已完成 |\n| drawio-mcp | 安装 `@drawio/mcp@1.2.7` 到 `D:\\MCP\\drawio-mcp`，添加 Codex MCP 配置 | ✅ 已完成 |\n| EDA 工具链 | 通过 MSYS2 UCRT64 安装 Yosys、Icarus Verilog、GTKWave | ✅ 已完成 |\n| PATH 配置 | 将 Python、MSYS2 UCRT64 bin 加入用户 PATH | ✅ 已完成 |\n| 工作流沉淀 | 新增 `E:\\每日记录\\AI_EDA_Verification_Workflow.md` | ✅ 已完成 |\n\n### 已验证工具版本\n\n| 工具 | 版本 | 路径 |\n|------|------|------|\n| python | 3.13.13 | `D:\\Python\\Python313\\python.exe` |\n| yosys | 0.56-4 | `D:\\msys64\\ucrt64\\bin\\yosys.exe` |\n| iverilog | 13.0 | `D:\\msys64\\ucrt64\\bin\\iverilog.exe` |\n| vvp | 13.0 | `D:\\msys64\\ucrt64\\bin\\vvp.exe` |\n| gtkwave | 3.3.127 | `D:\\msys64\\ucrt64\\bin\\gtkwave.exe` |\n\n### Smoke Test 结果\n\n| 步骤 | 结果 |\n|------|------|\n| 创建简单 `and2` Verilog 模块和 self-checking testbench | ✅ 完成 |\n| 使用 `iverilog` 编译 | ✅ 成功 |\n| 使用 `vvp` 仿真 | 成功，输出 `PASS` |\n| 生成 `wave.vcd` | ✅ 成功 |\n| 使用 `yosys` 完成 generic synthesis / stat 检查 | ✅ 成功 |\n| 临时 smoke test 目录清理 | ✅ 已完成 |\n\n### 后续如何使用\n\n如果需要让 AI 写 RTL 并自动验证，可以这样发起任务：\n\n```text\n先读取 E:\\每日记录\\AI_EDA_Verification_Workflow.md，\n然后按这个 EDA workflow 帮我实现并验证 <模块名>。\n需要生成 RTL、self-checking testbench、仿真结果、波形和 Yosys 综合检查结果。\n```\n\n也可以更简短地说：\n\n```text\n按 EDA workflow 验证这个模块。\n```\n\nAI 后续默认应执行的步骤：\n\n- 读取 `AI_EDA_Verification_Workflow.md`\n- 明确模块接口、功能规则、时序假设和 corner case\n- 编写或修改 RTL\n- 编写 self-checking testbench\n- 用 `iverilog` 编译\n- 用 `vvp` 跑仿真\n- 生成 `wave.vcd`\n- 用 `yosys` 做 `read_verilog`、`hierarchy -check`、`check`、`synth`、`stat`\n- 汇总 PASS/FAIL、命令、日志路径、波形路径、假设和风险\n\n常用命令模板：\n\n```powershell\nwhere python\nwhere iverilog\nwhere vvp\nwhere yosys\nwhere gtkwave\npython --version\niverilog -V\nyosys -V\ngtkwave --version\n```\n\n```powershell\niverilog -g2012 -Wall -o sim\\sim.vvp tb\\tb_<module>.v rtl\\<module>.v\nvvp sim\\sim.vvp\n```\n\n```powershell\nyosys -p \"read_verilog rtl\\<module>.v; hierarchy -check -top <module>; proc; check\"\nyosys -p \"read_verilog rtl\\<module>.v; hierarchy -check -top <module>; synth -top <module>; stat\"\n```\n\n```powershell\ngtkwave sim\\wave.vcd\n```\n\n### 当前能力边界\n\n| 能力范围 | 说明 |\n|----------|------|\n| 适合覆盖 | 普通组合逻辑、小型时序逻辑、寄存器字段、checksum、counter、FSM、mux/decoder 等基础正确性验证 |\n| 当前覆盖 | 仿真正确性、波形生成、RTL 解析、generic synthesis、资源统计 |\n| 不能替代 | CDC/RDC signoff、真实工艺库 STA、门级 SDF 仿真、UVM 完整验证、商业 FSDB 流程 |\n\n### 下一步建议\n\n| 事项 | 说明 |\n|------|------|\n| 自动化脚本 | 补充通用 `run_eda_verify.py`，一条命令跑完 `iverilog -> vvp -> PASS 检查 -> yosys -> Markdown 报告` |\n| testbench 模板 | 沉淀常用模块模板：组合逻辑穷举、随机向量、valid-ready、寄存器读写、FSM 状态跳转检查 |\n", "HV2M23/每日记录_0609.md": "# 每日记录 - 06/09 (星期二)\n\n### 今日完成\n\n#### Issue 报告/PPT 准备\n\n| 类型 | 事项 | 结果/状态 |\n|------|------|----------|\n| 任务记录 | 明确周五（2026/06/12）前需完成图二、图三两个 issue 的 PPT，结构按“现象说明、真因与电路模拟分析、修改前后电路模拟确认、专案平展、预防策略与方案”整理 | 📝 已记录 |\n| 任务记录 | 记录领导补充要求：整理 checklist，将 lesson_learn 内容 merge 进去；同步准备 3 份 Issue 报告 | 📝 已记录 |\n| 报告开通 | 在 `E:\\report` 下新建图二、图三两个 issue 的 Markdown 初稿，按五个方向搭建报告结构 | ✅ 已完成 |\n| 资料归档 | 为两个 issue 报告归档原始表格截图和“五个方向”说明图 | ✅ 已完成 |\n\n#### DRDOD 功能整理\n\n| 类型 | 事项 | 结果/状态 |\n|------|------|----------|\n| 报告完善 | 更新 `E:\\report\\drdod-function-summary\\drdod-function-summary.md`，补充功能链路、关键配置、pattern / weight / source timing 等说明 | ✅ 已完成 |\n| 规格观测 | 新增 `drdod-design-report-spec-architecture.md`，围绕 Design Report 前两项整理观察结论和待确认边界 | ✅ 已完成 |\n| 图片归档 | 补充 DRDOD 原始 Design Report 的 SVG/PNG 预览图、DRD panel signal classification 等辅助图片 | ✅ 已完成 |\n\n#### 报告网站/工作区说明\n\n| 类型 | 事项 | 结果/状态 |\n|------|------|----------|\n| 网站更新 | 更新本地只读 report 网站对 `E:\\report` 的读取与展示逻辑，支持按报告目录浏览 Markdown 和图片资源 | ✅ 已完成 |\n| 导航优化 | 优化只读报告页标题导航、报告列表显示和展开/收起行为 | ✅ 已完成 |\n| 工作区说明 | 更新 `AGENTS.md`，补充每日记录工作区、本地网站、日报/周报规则、EDA 验证工作流和 draw.io MCP 使用说明 | ✅ 已完成 |\n\n#### AI 使用报告\n\n| 类型 | 事项 | 结果/状态 |\n|------|------|----------|\n| 报告完善 | 更新 `AI使用报告_方向一_每日记录工作流` 和 `AI使用报告_方向二_模块设计到代码验证流程` | ✅ 已完成 |\n| PPT 准备 | 输出两份 AI 使用报告的图文辅助版 PPT，作为后续汇报材料 | ✅ 已完成 |\n\n### 下一步待做\n\n| 模块 | 事项 | 优先级 |\n|------|------|--------|\n| Issue 报告/PPT 准备 | 在 2026/06/12 前完成图二、图三两个 issue
